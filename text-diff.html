<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Diff — JustTools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <style>
    
    .diff-panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;} .diff-output{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:20px;font-size:13px;line-height:1.9;min-height:120px;white-space:pre-wrap;word-break:break-word;} .add{background:rgba(63,185,80,0.2);color:#3fb950;border-radius:3px;padding:1px 3px;} .del{background:rgba(255,123,114,0.2);color:#ff7b72;border-radius:3px;padding:1px 3px;text-decoration:line-through;} .stats{display:flex;gap:20px;font-size:12px;margin-bottom:16px;} .stat{color:var(--muted);} .stat span{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;display:block;} .stat .green{color:var(--green);} .stat .red{color:var(--red);}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">✍️ Writing</div>
  <h1 class="tool-title">Text<br>Diff</h1>
  <p class="tool-desc">Compare two texts side by side. See what was added, removed, or changed — highlighted instantly.</p>
  
  <div class="diff-panels">
    <div><label>Original</label><textarea id="original" rows="8" placeholder="Original text..." oninput="diffTexts()"></textarea></div>
    <div><label>Modified</label><textarea id="modified" rows="8" placeholder="Modified text..." oninput="diffTexts()"></textarea></div>
  </div>
  <div class="stats" id="stats" style="display:none">
    <div class="stat"><span class="green" id="added-count">0</span>Added</div>
    <div class="stat"><span class="red" id="removed-count">0</span>Removed</div>
    <div class="stat"><span id="changed-count">0</span>Changed</div>
  </div>
  <div class="card" id="diff-out" style="display:none">
    <label>Diff Output</label>
    <div class="diff-output" id="diff-result"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/diff_match_patch/20121119/diff_match_patch.js"></script>
<script>
  function diffTexts(){
    const a = document.getElementById('original').value;
    const b = document.getElementById('modified').value;
    
    if (!a && !b) {
      document.getElementById('diff-out').style.display = 'none';
      document.getElementById('stats').style.display = 'none';
      return;
    }
    
    // If one is empty and the other isn't, but they are just initial placeholders or being cleared out, we might want to just show nothing if we don't want a massive "removed" block.
    // Actually, showing a massive removed block IS the correct diff. However, if the user finds it annoying, we can hide the diff until BOTH have content, or at least if one is completely empty we hide it.
    // The previous implementation hid it if `!a[0] && !b[0]`.
    if (!a || !b) {
        document.getElementById('diff-out').style.display = 'none';
        document.getElementById('stats').style.display = 'none';
        return;
    }
    
    const dmp = new diff_match_patch();
    const diffs = dmp.diff_main(a, b);
    dmp.diff_cleanupSemantic(diffs);
    
    let added = 0, removed = 0, html = '';
    
    diffs.forEach(diff => {
      const type = diff[0];
      const text = escH(diff[1]);
      
      if (type === 1) { // Insert
        html += `<span class="add">${text}</span>`;
        added += diff[1].length;
      } else if (type === -1) { // Delete
        html += `<span class="del">${text}</span>`;
        removed += diff[1].length;
      } else { // Equal
        html += `<span>${text}</span>`;
      }
    });

    document.getElementById('diff-result').innerHTML = html.replace(/\n/g, '<br>');
    document.getElementById('added-count').textContent = added;
    document.getElementById('removed-count').textContent = removed;
    document.getElementById('changed-count').textContent = Math.min(added, removed);
    document.getElementById('diff-out').style.display = 'block';
    document.getElementById('stats').style.display = 'flex';
  }
  function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  
</script>
<script src="common.js"></script>
</body>
</html>
