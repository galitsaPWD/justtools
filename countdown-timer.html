<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer — JustTools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
    :root { --bg: #0a0a0a; --surface: #111; --surface2: #161616; --border: #1e1e1e; --border-bright: #2e2e2e; --text: #f0f0f0; --muted: #666; --accent: #e8ff47; --accent-dim: rgba(232,255,71,0.08); --blue: #79c0ff; --green: #3fb950; --red: #ff7b72; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
    #cursor-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
    #cursor-ring { width: 28px; height: 28px; border: 1px solid rgba(232,255,71,0.4); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: left 0.12s ease, top 0.12s ease; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #666; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.85); backdrop-filter: blur(12px); }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-back { font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: var(--text); }
    .container { max-width: 860px; margin: 0 auto; padding: 60px 40px; }
    .tool-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 12px; }
    .tool-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 52px; line-height: 1.05; margin-bottom: 16px; }
    .tool-desc { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 40px; max-width: 520px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .btn { background: var(--accent); color: #000; border: none; padding: 12px 28px; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; transition: all 0.2s; }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; transform: none; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; transition: all 0.2s; }
    .btn-ghost:hover { border-color: var(--border-bright); color: var(--text); }
    textarea, input[type=text], input[type=number], input[type=datetime-local], select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; color-scheme: dark; }
    textarea:focus, input:focus, select:focus { border-color: var(--border-bright); }
    textarea { resize: vertical; }
    label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 8px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .col { flex: 1; min-width: 200px; }
    @media(max-width:640px) { nav { padding: 16px 20px; } .container { padding: 40px 16px; } .tool-title { font-size: 36px; } }
    .countdown-display{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:40px 0;} .unit{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px 16px;text-align:center;} .unit-num{font-family:'Syne',sans-serif;font-weight:800;font-size:48px;color:var(--accent);line-height:1;} .unit-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:8px;} .event-name{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;margin-bottom:8px;} .expired{text-align:center;padding:40px;font-family:'Syne',sans-serif;font-weight:800;font-size:32px;color:var(--accent);}
  </style>
</head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">⏱ Productivity</div>
  <h1 class="tool-title">Countdown<br>Timer</h1>
  <p class="tool-desc">Set a countdown to any date or event. See exactly how much time is left down to the second.</p>
  
  <div class="card">
    <div class="row">
      <div class="col"><label>Event Name</label><input type="text" id="event-name" placeholder="e.g. My Birthday" value="My Event"></div>
      <div class="col"><label>Target Date & Time</label><input type="datetime-local" id="target-date"></div>
    </div>
    <button class="btn" style="margin-top:16px" onclick="startCountdown()">Start Countdown</button>
  </div>
  <div id="countdown-wrap" style="display:none; margin-top: 40px;">
    <div class="event-name" id="display-name"></div>
    <div class="countdown-display" id="time-blocks">
      <div class="unit"><div class="unit-num" id="days">0</div><div class="unit-label">Days</div></div>
      <div class="unit"><div class="unit-num" id="hours">0</div><div class="unit-label">Hours</div></div>
      <div class="unit"><div class="unit-num" id="minutes">0</div><div class="unit-label">Minutes</div></div>
      <div class="unit"><div class="unit-num" id="seconds">0</div><div class="unit-label">Seconds</div></div>
    </div>
    <div id="expired-msg" class="expired" style="display:none"></div>
  </div>
</div>
<script>
  const dot = document.getElementById('cursor-dot'), ring = document.getElementById('cursor-ring');
  document.addEventListener('mousemove', e => { dot.style.left=e.clientX+'px'; dot.style.top=e.clientY+'px'; setTimeout(()=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';},80); });
  
  let countdownInterval;
  // Set default to tomorrow
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1); tomorrow.setHours(0,0,0,0);
  document.getElementById('target-date').value = tomorrow.toISOString().slice(0,16);
  function startCountdown(){
    const target=new Date(document.getElementById('target-date').value);
    const name=document.getElementById('event-name').value||'Countdown';
    if(!target||isNaN(target))return;
    clearInterval(countdownInterval);
    document.getElementById('display-name').textContent=name;
    document.getElementById('countdown-wrap').style.display='block';
    
    const timeBlocks = document.getElementById('time-blocks');
    const expiredMsg = document.getElementById('expired-msg');
    
    timeBlocks.style.display = 'grid';
    expiredMsg.style.display = 'none';
    
    function tick(){
      const diff=target-Date.now();
      if(diff<=0){
        clearInterval(countdownInterval);
        timeBlocks.style.display = 'none';
        document.getElementById('display-name').style.display = 'none';
        expiredMsg.textContent = `🎉 ${name} is here!`;
        expiredMsg.style.display = 'block';
        return;
      }
      document.getElementById('display-name').style.display = 'block';
      const d=Math.floor(diff/86400000);
      const h=Math.floor((diff%86400000)/3600000);
      const m=Math.floor((diff%3600000)/60000);
      const s=Math.floor((diff%60000)/1000);
      document.getElementById('days').textContent=String(d).padStart(2,'0');
      document.getElementById('hours').textContent=String(h).padStart(2,'0');
      document.getElementById('minutes').textContent=String(m).padStart(2,'0');
      document.getElementById('seconds').textContent=String(s).padStart(2,'0');
    }
    tick();
    countdownInterval=setInterval(tick,1000);
  }
  startCountdown();
  
</script>
</body>
</html>
