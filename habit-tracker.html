<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker — JustTools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <style>
    
    .habit-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;transition:border-color 0.2s;} .habit-row.done{border-color:rgba(63,185,80,0.3);} .habit-check{width:22px;height:22px;border:2px solid var(--border-bright);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.2s;} .habit-row.done .habit-check{background:var(--green);border-color:var(--green);} .habit-name{flex:1;font-size:14px;} .habit-row.done .habit-name{text-decoration:line-through;color:var(--muted);} .streak{font-size:11px;color:var(--accent);font-weight:700;} .del-btn{background:none;border:none;color:var(--muted);font-size:16px;padding:4px;transition:color 0.2s;} .del-btn:hover{color:var(--red);} .add-row{display:flex;gap:10px;margin-bottom:20px;} .progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:24px;overflow:hidden;} .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s ease;}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">⏱ Productivity</div>
  <h1 class="tool-title">Habit<br>Tracker</h1>
  <p class="tool-desc">Track your daily habits. Add habits, check them off each day, and watch your streaks grow. Saves in your browser.</p>
  
  <div class="add-row">
    <input type="text" id="new-habit" placeholder="Add a new habit..." onkeydown="if(event.key==='Enter')addHabit()">
    <button class="btn" onclick="addHabit()">Add</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div id="habit-list"></div>
  <div id="empty-state" style="text-align:center;padding:40px;color:var(--muted);font-size:13px">No habits yet. Add one above!</div>
</div>
<script>
  const TODAY = new Date().toDateString();
  let data = JSON.parse(localStorage.getItem('jt-habits') || '[]');
  function save(){localStorage.setItem('jt-habits',JSON.stringify(data));}
  function addHabit(){
    const name=document.getElementById('new-habit').value.trim();
    if(!name)return;
    data.push({id:Date.now(),name,done:{},streak:0});
    document.getElementById('new-habit').value='';
    save();render();
  }
  function toggle(id){
    const h=data.find(h=>h.id===id);
    if(!h)return;
    h.done[TODAY]=!h.done[TODAY];
    // Update streak
    let streak=0,d=new Date();
    while(true){const k=d.toDateString();if(h.done[k]){streak++;d.setDate(d.getDate()-1);}else break;}
    h.streak=streak;
    save();render();
  }
  function deleteHabit(id){data=data.filter(h=>h.id!==id);save();render();}
  function render(){
    const list=document.getElementById('habit-list');
    const empty=document.getElementById('empty-state');
    empty.style.display=data.length?'none':'block';
    const done=data.filter(h=>h.done[TODAY]).length;
    document.getElementById('progress-fill').style.width=data.length?(done/data.length*100)+'%':'0%';
    list.innerHTML=data.map(h=>`
      <div class="habit-row ${h.done[TODAY]?'done':''}" onclick="toggle(${h.id})">
        <div class="habit-check">${h.done[TODAY]?'✓':''}</div>
        <div class="habit-name">${h.name}</div>
        ${h.streak>1?`<span class="streak">🔥 ${h.streak}</span>`:''}
        <button class="del-btn" onclick="event.stopPropagation();deleteHabit(${h.id})">×</button>
      </div>`).join('');
  }
  render();
  
</script>
<script src="common.js"></script>
</body>
</html>
