<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Summarizer — JustTools</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;cursor:none!important}
  :root{--bg:#0a0a0a;--surface:#111;--border:#1e1e1e;--border-bright:#2e2e2e;--text:#f0f0f0;--muted:#666;--accent:#e8ff47;--accent-dim:rgba(232,255,71,0.1);--green:#47ff8a;--red:#ff6b6b;--blue:#79c0ff}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
  .cursor{width:10px;height:10px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform 0.15s}
  .cursor-ring{width:36px;height:36px;border:1px solid rgba(232,255,71,0.4);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width 0.2s,height 0.2s}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:100px}::-webkit-scrollbar-thumb:hover{background:var(--muted)}
  nav{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;border-bottom:1px solid var(--border);background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
  .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;text-decoration:none;color:var(--text)}
  .nav-logo span{color:var(--accent)}
  .nav-back{color:var(--muted);font-size:13px;text-decoration:none;transition:color 0.2s}
  .nav-back:hover{color:var(--text)}
  .container{max-width:860px;margin:0 auto;padding:64px 24px}
  .tool-label{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
  .tool-title{font-family:'Syne',sans-serif;font-weight:800;font-size:48px;letter-spacing:-2px;line-height:1;margin-bottom:12px}
  .tool-desc{color:var(--muted);font-size:14px;margin-bottom:32px}
  .ai-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(232,255,71,0.08);border:1px solid rgba(232,255,71,0.2);padding:5px 12px;border-radius:100px;font-size:11px;color:var(--accent);margin-bottom:32px}

  textarea.main-input{width:100%;min-height:240px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;line-height:1.8;resize:vertical;outline:none;transition:border-color 0.2s;margin-bottom:12px}
  textarea.main-input:focus{border-color:var(--border-bright)}
  .input-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:12px;color:var(--muted)}

  .action-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px;align-items:center}
  .primary-btn{background:var(--accent);color:#000;border:none;padding:13px 32px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;transition:all 0.2s;min-width:160px;display:flex;align-items:center;justify-content:center;gap:8px}
  .primary-btn:hover{opacity:0.85;transform:translateY(-1px)}
  .primary-btn:disabled{opacity:0.5;transform:none}
  .secondary-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:13px 20px;border-radius:10px;font-family:'DM Mono',monospace;font-size:13px;transition:all 0.2s}
  .secondary-btn:hover{color:var(--text);border-color:var(--border-bright)}
  .loading-dots{display:none;align-items:center;gap:4px}
  .loading-dots span{width:6px;height:6px;background:#000;border-radius:50%;animation:dot-bounce 1.2s infinite}
  .loading-dots span:nth-child(2){animation-delay:0.2s}
  .loading-dots span:nth-child(3){animation-delay:0.4s}
  @keyframes dot-bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

  .result-section{display:none;animation:fadeUp 0.4s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  .result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .result-label{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
  .compression-badge{background:rgba(71,255,138,0.1);color:var(--green);font-size:12px;padding:4px 12px;border-radius:100px}

  .summary-box{background:var(--surface);border:1px solid var(--green);border-radius:12px;padding:28px;margin-bottom:20px;font-size:15px;line-height:1.9;color:var(--text)}

  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
  .stat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--accent)}
  .stat-label{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.06em}

  .key-points{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 24px;margin-bottom:24px}
  .key-points-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:14px}
  .key-point{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.6}
  .key-point:last-child{border-bottom:none}
  .key-point-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;flex-shrink:0;margin-top:6px}

  .result-actions{display:flex;gap:8px;flex-wrap:wrap}

  .error-bar{background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.3);border-radius:8px;padding:10px 16px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}
  @media(max-width:640px){nav{padding:16px 20px}.container{padding:40px 16px}.tool-title{font-size:36px}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">✍️ Writing</div>
  <h1 class="tool-title">Text<br>Summarizer</h1>
  <p class="tool-desc">Paste any long article, essay, or document and get a clean, concise summary in seconds.</p>
  

  <div class="error-bar" id="error-bar"></div>

  <textarea class="main-input" id="input-text" placeholder="Paste your article, essay, report, or any long text here..." oninput="updateMeta()"></textarea>
  <div class="input-meta">
    <span id="input-meta-left">Paste text above to get started</span>
    <span id="input-meta-right"></span>
  </div>

  <div class="action-row">
    <button class="primary-btn" id="sum-btn" onclick="summarize()">
      <span id="btn-text">⚡ Summarize</span>
      <span class="loading-dots" id="loading"><span></span><span></span><span></span></span>
    </button>
    <button class="secondary-btn" onclick="clearAll()">Clear</button>
  </div>

  <div class="result-section" id="result-section">
    <div class="result-header">
      <div class="result-label">Summary</div>
      <div class="compression-badge" id="compression-badge"></div>
    </div>

    <div class="summary-box" id="summary-box"></div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="stat-orig">0</div><div class="stat-label">Original words</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-summ">0</div><div class="stat-label">Summary words</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-ratio">0%</div><div class="stat-label">Compression</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-time">0m</div><div class="stat-label">Time saved</div></div>
    </div>

    <div class="result-actions">
      <button class="secondary-btn" onclick="copySummary()">Copy Summary</button>
      <button class="secondary-btn" onclick="clearAll()">Summarize Another</button>
    </div>
  </div>
</div>

<script>
  const cur=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'});
  (function a(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a)})();
  document.querySelectorAll('a,button,textarea').forEach(el=>{
    el.addEventListener('mouseenter',()=>{cur.style.transform='translate(-50%,-50%) scale(2)';ring.style.width='56px';ring.style.height='56px'});
    el.addEventListener('mouseleave',()=>{cur.style.transform='translate(-50%,-50%) scale(1)';ring.style.width='36px';ring.style.height='36px'});
  });

  function wordCount(t) { return t.trim() ? t.trim().split(/\s+/).length : 0; }

  function updateMeta() {
    const text = document.getElementById('input-text').value;
    const words = wordCount(text);
    const readTime = Math.ceil(words / 238);
    document.getElementById('input-meta-left').textContent = words ? `${words} words` : 'Paste text above to get started';
    document.getElementById('input-meta-right').textContent = words ? `~${readTime} min read` : '';
  }

  async function summarize() {
    const text = document.getElementById('input-text').value.trim();
    if (!text) return;
    if (wordCount(text) < 30) { showError('Please paste more text — at least 30 words for a meaningful summary.'); return; }
    setLoading(true); hideError();

    try {
      const res = await fetch('/api/ai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tool: 'summarize', text })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');

      const origWords = wordCount(text);
      const summWords = wordCount(data.result);
      const ratio = Math.round((1 - summWords / origWords) * 100);
      const timeSaved = Math.max(1, Math.ceil((origWords - summWords) / 238));

      document.getElementById('summary-box').textContent = data.result;
      document.getElementById('compression-badge').textContent = `${ratio}% shorter`;
      document.getElementById('stat-orig').textContent = origWords;
      document.getElementById('stat-summ').textContent = summWords;
      document.getElementById('stat-ratio').textContent = ratio + '%';
      document.getElementById('stat-time').textContent = timeSaved + 'm';

      document.getElementById('result-section').style.display = 'block';
      document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch(e) {
      showError(e.message);
    }
    setLoading(false);
  }

  function copySummary() {
    navigator.clipboard.writeText(document.getElementById('summary-box').textContent);
  }
  function clearAll() {
    document.getElementById('input-text').value = '';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('input-meta-left').textContent = 'Paste text above to get started';
    document.getElementById('input-meta-right').textContent = '';
    hideError();
  }
  function setLoading(on) {
    document.getElementById('sum-btn').disabled = on;
    document.getElementById('btn-text').style.display = on ? 'none' : 'inline';
    document.getElementById('loading').style.display = on ? 'flex' : 'none';
  }
  function showError(msg) { const e=document.getElementById('error-bar'); e.textContent='⚠ '+msg; e.style.display='block'; }
  function hideError() { document.getElementById('error-bar').style.display='none'; }
</script>
</body>
</html>
