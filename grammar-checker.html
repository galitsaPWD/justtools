<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Checker — JustTools</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="common.css">
<style>
  .ai-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(232,255,71,0.08);border:1px solid rgba(232,255,71,0.2);padding:5px 12px;border-radius:100px;font-size:11px;color:var(--accent);margin-bottom:32px}
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--surface);transition:border-color 0.3s;align-items:stretch}
  .panels.done{border-color:rgba(71,255,138,0.3)}
  .panel-wrap{display:flex;flex-direction:column;flex:1}
  .panel-wrap:first-child{border-right:1px solid var(--border)}
  .panel-header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.015)}
  .panel-header-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.14em}
  .panel-header-meta{font-size:11px;color:var(--accent)}
  .panel-header-status{font-size:11px;color:var(--green)}
  textarea.panel{width:100%;flex:1;min-height:280px;background:transparent;border:none;padding:22px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;line-height:1.9;resize:none;outline:none}
  .output-panel{width:100%;flex:1;min-height:280px;padding:22px;font-family:'DM Mono',monospace;font-size:14px;line-height:1.9;color:#444;white-space:pre-wrap;word-break:break-word;transition:color 0.4s;overflow-y:auto}
  .output-panel.has-result{color:var(--text)}
  .action-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px;align-items:center}
  .check-btn{background:var(--accent);color:#000;border:none;padding:13px 32px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;transition:all 0.2s;min-width:160px}
  .check-btn:hover{opacity:0.85;transform:translateY(-1px)}
  .check-btn:disabled{opacity:0.5;transform:none}
  .secondary-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:13px 20px;border-radius:10px;font-family:'DM Mono',monospace;font-size:13px;transition:all 0.2s}
  .secondary-btn:hover{color:var(--text);border-color:var(--border-bright)}
  .loading-dots{display:none;align-items:center;gap:4px;padding:0 8px}
  .loading-dots span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:dot-bounce 1.2s infinite}
  .loading-dots span:nth-child(2){animation-delay:0.2s}
  .loading-dots span:nth-child(3){animation-delay:0.4s}
  @keyframes dot-bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
  .diff-view{display:none;margin-bottom:24px}
  .diff-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}
  .diff-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;font-size:13px;line-height:1.8}
  .diff-added{background:rgba(71,255,138,0.15);color:var(--green);border-radius:3px;padding:0 3px}
  .diff-removed{background:rgba(255,107,107,0.15);color:var(--red);text-decoration:line-through;border-radius:3px;padding:0 3px}
  .stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:32px}
  .stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:12px;color:var(--muted)}
  .stat-pill strong{color:var(--text)}
  .error-bar{background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.3);border-radius:8px;padding:10px 16px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}
  @media(max-width:640px){.panels{grid-template-columns:1fr}nav{padding:16px 20px}.container{padding:40px 16px}.tool-title{font-size:36px}}
</style>
</head>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">✍️ Writing</div>
  <h1 class="tool-title">Grammar<br>Checker</h1>
  <p class="tool-desc">Fix grammar, spelling, and punctuation errors instantly. Powered by AI — runs in seconds.</p>
  

  <div class="error-bar" id="error-bar"></div>

  <div class="panels" id="panels">
    <div class="panel-wrap">
      <div class="panel-header">
        <span class="panel-header-label">Your Text</span>
        <span class="panel-header-meta" id="in-count"></span>
      </div>
      <textarea class="panel" id="input-text" placeholder="Paste your text here and we'll fix any grammar, spelling, or punctuation errors..." oninput="updateCount()"></textarea>
    </div>
    <div class="panel-wrap">
      <div class="panel-header">
        <span class="panel-header-label">Corrected Text</span>
        <span class="panel-header-status" id="out-status"></span>
      </div>
      <div class="output-panel" id="output-panel">Corrected text will appear here...</div>
    </div>
  </div>

  <div class="action-row">
    <button class="check-btn" id="check-btn" onclick="checkGrammar()">
      <span id="btn-text">✓ Check Grammar</span>
      <span class="loading-dots" id="loading"><span></span><span></span><span></span></span>
    </button>
    <button class="secondary-btn" onclick="copyOutput()">Copy Result</button>
    <button class="secondary-btn" onclick="swapToInput()">Use as Input</button>
    <button class="secondary-btn" onclick="clearAll()">Clear</button>
  </div>

  <div class="stats-row" id="stats-row" style="display:none">
    <div class="stat-pill">Words: <strong id="stat-words">0</strong></div>
    <div class="stat-pill">Changes: <strong id="stat-changes">0</strong></div>
    <div class="stat-pill">Score: <strong id="stat-score">—</strong></div>
  </div>

  <div class="diff-view" id="diff-view">
    <div class="diff-title">What changed</div>
    <div class="diff-box" id="diff-box"></div>
  </div>
</div>

<script>
  function updateCount() {
    const ta = document.getElementById('input-text');
    const text = ta.value;
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    document.getElementById('in-count').textContent = words ? words + ' words' : '';
    ta.style.height = '0px';
    const newH = Math.max(280, ta.scrollHeight) + 'px';
    ta.style.height = newH;
    document.getElementById('output-panel').style.minHeight = newH;
  }

  async function checkGrammar() {
    const text = document.getElementById('input-text').value.trim();
    if (!text) return;
    setLoading(true);
    hideError();

    try {
      const data = await window.aiFetch({ tool: 'grammar', text });

      const output = document.getElementById('output-panel');
      output.textContent = data.result;
      output.classList.add('has-result');
      document.getElementById('panels').classList.add('done');
      document.getElementById('out-status').textContent = '✓ Fixed';

      showStats(text, data.result);
      showDiff(text, data.result);
    } catch(e) {
      showError(e.message);
    }
    setLoading(false);
  }

  function showStats(original, corrected) {
    const words = corrected.trim().split(/\s+/).length;
    const origWords = original.trim().split(/\s+/);
    const corrWords = corrected.trim().split(/\s+/);
    let changes = 0;
    const maxLen = Math.max(origWords.length, corrWords.length);
    for (let i = 0; i < maxLen; i++) {
      if (origWords[i] !== corrWords[i]) changes++;
    }
    const score = Math.max(0, Math.round(100 - (changes / origWords.length) * 100));
    document.getElementById('stat-words').textContent = words;
    document.getElementById('stat-changes').textContent = changes;
    document.getElementById('stat-score').textContent = score + '%';
    document.getElementById('stats-row').style.display = 'flex';
  }

  function showDiff(original, corrected) {
    const origWords = original.split(' ');
    const corrWords = corrected.split(' ');
    let html = '';
    const maxLen = Math.max(origWords.length, corrWords.length);
    for (let i = 0; i < maxLen; i++) {
      const o = origWords[i] || '';
      const c = corrWords[i] || '';
      if (o === c) { html += c + ' '; }
      else {
        if (o) html += `<span class="diff-removed">${o}</span> `;
        if (c) html += `<span class="diff-added">${c}</span> `;
      }
    }
    document.getElementById('diff-box').innerHTML = html;
    document.getElementById('diff-view').style.display = 'block';
  }

  function copyOutput() {
    const text = document.getElementById('output-panel').textContent;
    if (text !== 'Corrected text will appear here...') navigator.clipboard.writeText(text);
  }
  function swapToInput() {
    const text = document.getElementById('output-panel').textContent;
    if (text !== 'Corrected text will appear here...') {
      document.getElementById('input-text').value = text;
      document.getElementById('output-panel').textContent = 'Corrected text will appear here...';
      document.getElementById('output-panel').classList.remove('has-result');
      document.getElementById('diff-view').style.display = 'none';
      document.getElementById('stats-row').style.display = 'none';
      updateCount();
    }
  }
  function clearAll() {
    document.getElementById('input-text').value = '';
    document.getElementById('output-panel').textContent = 'Corrected text will appear here...';
    document.getElementById('output-panel').classList.remove('has-result');
    document.getElementById('panels').classList.remove('done');
    document.getElementById('diff-view').style.display = 'none';
    document.getElementById('stats-row').style.display = 'none';
    document.getElementById('in-count').textContent = '';
    document.getElementById('out-status').textContent = '';
    hideError();
  }
  function setLoading(on) {
    document.getElementById('check-btn').disabled = on;
    document.getElementById('btn-text').style.display = on ? 'none' : 'inline';
    document.getElementById('loading').style.display = on ? 'flex' : 'none';
  }
  function showError(msg) { const e=document.getElementById('error-bar'); e.textContent='⚠ '+msg; e.style.display='block'; }
  function hideError() { document.getElementById('error-bar').style.display='none'; }
</script>
<script>window.isAITool=true;</script>
<script src="common.js"></script>
</body>
</html>
