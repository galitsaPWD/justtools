<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart Builder — JustTools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;cursor:none!important}
    :root{--bg:#0a0a0a;--surface:#111;--surface2:#161616;--border:#1e1e1e;--border-bright:#2e2e2e;--text:#f0f0f0;--muted:#666;--accent:#e8ff47;--accent-dim:rgba(232,255,71,0.08);--blue:#79c0ff;--green:#3fb950;--red:#ff7b72}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
    #cursor-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
    #cursor-ring{width:28px;height:28px;border:1px solid rgba(232,255,71,0.4);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left 0.12s ease,top 0.12s ease}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2e2e2e;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#666}
    nav{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.85);backdrop-filter:blur(12px)}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--text);text-decoration:none}
    .nav-logo span{color:var(--accent)}
    .nav-back{font-size:12px;color:var(--muted);text-decoration:none;transition:color 0.2s}
    .nav-back:hover{color:var(--text)}
    .container{max-width:900px;margin:0 auto;padding:60px 40px}
    .tool-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.14em;margin-bottom:12px}
    .tool-title{font-family:'Syne',sans-serif;font-weight:800;font-size:52px;line-height:1.05;margin-bottom:16px}
    .tool-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:40px;max-width:520px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
    .btn{background:var(--accent);color:#000;border:none;padding:12px 28px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;transition:all 0.2s}
    .btn:hover{opacity:0.85;transform:translateY(-1px)}
    .btn:disabled{opacity:0.5;transform:none}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);padding:10px 20px;border-radius:8px;font-family:'DM Mono',monospace;font-size:13px;transition:all 0.2s}
    .btn-ghost:hover{border-color:var(--border-bright);color:var(--text)}
    input[type=text],input[type=number],select,textarea{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;width:100%}
    input:focus,select:focus,textarea:focus{border-color:var(--border-bright)}
    label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;display:block;margin-bottom:8px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .col{flex:1;min-width:180px}
    @media(max-width:640px){nav{padding:16px 20px}.container{padding:40px 16px}.tool-title{font-size:36px}}
    
  .chart-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;min-height:320px;display:flex;align-items:center;justify-content:center;}
  canvas{max-width:100%;max-height:320px;}
  .type-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .type-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:8px 18px;border-radius:8px;font-size:12px;font-family:'DM Mono',monospace;transition:all 0.2s;}
  .type-btn.active{border-color:var(--accent);color:var(--accent);}
  .data-entry{display:grid;grid-template-columns:1fr 80px 28px;gap:8px;align-items:center;margin-bottom:8px;}
  .data-entry input{padding:8px 12px;font-size:12px;}
  .del-row{background:none;border:none;color:var(--muted);font-size:18px;transition:color 0.2s;padding:0;}
  .del-row:hover{color:var(--red);}
  
  </style>
</head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">📊 Data</div>
  <h1 class="tool-title">Chart<br>Builder</h1>
  <p class="tool-desc">Turn raw numbers into beautiful charts. Bar, line, pie — no spreadsheet software needed.</p>
  
  <div class="chart-wrap"><canvas id="myChart"></canvas></div>
  <div class="card">
    <label style="margin-bottom:12px">Chart Type</label>
    <div class="type-row">
      <button class="type-btn active" onclick="setType('bar',this)">Bar</button>
      <button class="type-btn" onclick="setType('line',this)">Line</button>
      <button class="type-btn" onclick="setType('pie',this)">Pie</button>
      <button class="type-btn" onclick="setType('doughnut',this)">Doughnut</button>
      <button class="type-btn" onclick="setType('polarArea',this)">Polar</button>
    </div>
    <div style="margin-bottom:16px">
      <label>Chart Title</label>
      <input type="text" id="chart-title" placeholder="My Chart" oninput="buildChart()" value="Monthly Revenue">
    </div>
    <label style="margin-bottom:10px">Data</label>
    <div style="display:grid;grid-template-columns:1fr 80px 28px;gap:8px;margin-bottom:8px;padding:0 2px">
      <span style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Label</span>
      <span style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Value</span>
      <span></span>
    </div>
    <div id="data-rows"></div>
    <button class="btn-ghost" style="font-size:12px;margin-top:8px" onclick="addRow()">+ Add Row</button>
    <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap">
      <button class="btn" onclick="downloadChart()">⬇ Download PNG</button>
      <button class="btn-ghost" onclick="randomizeColors()">🎲 Colors</button>
    </div>
  </div>
</div>
<script>
  const dot=document.getElementById('cursor-dot'),ring=document.getElementById('cursor-ring');
  document.addEventListener('mousemove',e=>{dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';setTimeout(()=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';},80);});
  
  const CDN='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
  const s=document.createElement('script');s.src=CDN;document.head.appendChild(s);
  s.onload=()=>{init()};
  let chartType='bar', chartInst=null;
  let rows=[
    {label:'Jan',value:4200},{label:'Feb',value:3800},{label:'Mar',value:5100},
    {label:'Apr',value:4700},{label:'May',value:6200},{label:'Jun',value:5800}
  ];
  let colors=['#e8ff47','#79c0ff','#ff7b72','#3fb950','#f0c674','#c792ea'];
  function setType(t,btn){chartType=t;document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');buildChart();}
  function renderRows(){
    document.getElementById('data-rows').innerHTML=rows.map((r,i)=>`
      <div class="data-entry">
        <input type="text" value="${r.label}" oninput="rows[${i}].label=this.value;buildChart()" placeholder="Label">
        <input type="number" value="${r.value}" oninput="rows[${i}].value=+this.value;buildChart()" placeholder="0">
        ${rows.length>2?`<button class="del-row" onclick="rows.splice(${i},1);renderRows();buildChart()">×</button>`:'<span></span>'}
      </div>`).join('');
  }
  function addRow(){rows.push({label:'New',value:0});renderRows();buildChart();}
  function randomizeColors(){colors=rows.map(()=>'#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0'));buildChart();}
  function buildChart(){
    if(typeof Chart==='undefined')return;
    const ctx=document.getElementById('myChart').getContext('2d');
    if(chartInst)chartInst.destroy();
    const labels=rows.map(r=>r.label), data=rows.map(r=>r.value);
    const bg=rows.map((_,i)=>colors[i%colors.length]);
    chartInst=new Chart(ctx,{
      type:chartType,
      data:{labels,datasets:[{label:document.getElementById('chart-title').value||'Data',data,backgroundColor:bg,borderColor:bg,borderWidth:2,tension:0.4}]},
      options:{responsive:true,plugins:{legend:{labels:{color:'#f0f0f0',font:{family:'DM Mono'}}},title:{display:true,text:document.getElementById('chart-title').value,color:'#f0f0f0',font:{family:'Syne',size:16,weight:'800'}}},scales:chartType==='pie'||chartType==='doughnut'||chartType==='polarArea'?{}:{x:{ticks:{color:'#666'},grid:{color:'#1e1e1e'}},y:{ticks:{color:'#666'},grid:{color:'#1e1e1e'}}}}
    });
  }
  function downloadChart(){const a=document.createElement('a');a.href=document.getElementById('myChart').toDataURL();a.download='chart.png';a.click();}
  function init(){renderRows();buildChart();}
  
</script>
</body>
</html>
