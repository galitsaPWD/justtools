<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Converter — JustTools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <style>
    
    .case-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:16px;} .case-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;font-family:'DM Mono',monospace;font-size:12px;text-align:left;transition:all 0.2s;} .case-btn:hover{border-color:var(--accent);color:var(--accent);} .case-label{font-size:10px;color:var(--muted);margin-bottom:4px;} .output-box{background:var(--surface2);border:1px solid rgba(232,255,71,0.2);border-radius:8px;padding:16px;font-size:13px;line-height:1.7;color:var(--text);min-height:60px;word-break:break-all;margin-top:16px;}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">✍️ Writing</div>
  <h1 class="tool-title">Case<br>Converter</h1>
  <p class="tool-desc">Convert text between uppercase, lowercase, title case, camelCase, snake_case, kebab-case and more.</p>
  
  <div class="card">
    <label>Input Text</label>
    <textarea id="input" rows="4" placeholder="Type or paste your text here..." oninput="convertAll()"></textarea>
    <div class="case-grid" id="case-grid"></div>
    <div class="output-box" id="output" style="display:none"></div>
    <button class="btn-ghost" style="margin-top:12px" onclick="copyResult()">Copy Result</button>
  </div>
</div>
<script>
  const cases = [
    {label:'UPPERCASE', fn: s => s.toUpperCase()},
    {label:'lowercase', fn: s => s.toLowerCase()},
    {label:'Title Case', fn: s => s.replace(/\w\S*/g, t => t.charAt(0).toUpperCase()+t.substr(1).toLowerCase())},
    {label:'Sentence case', fn: s => s.charAt(0).toUpperCase()+s.slice(1).toLowerCase()},
    {label:'camelCase', fn: s => s.replace(/[^a-zA-Z0-9]+(.)/g,(_,c)=>c.toUpperCase()).replace(/^./,c=>c.toLowerCase())},
    {label:'PascalCase', fn: s => s.replace(/[^a-zA-Z0-9]+(.)/g,(_,c)=>c.toUpperCase()).replace(/^./,c=>c.toUpperCase())},
    {label:'snake_case', fn: s => s.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'').toLowerCase()},
    {label:'kebab-case', fn: s => s.replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,'').toLowerCase()},
    {label:'CONSTANT_CASE', fn: s => s.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'').toUpperCase()},
    {label:'dot.case', fn: s => s.replace(/\s+/g,'.').replace(/[^a-zA-Z0-9.]/g,'').toLowerCase()},
    {label:'Reverse', fn: s => s.split('').reverse().join('')},
    {label:'No spaces', fn: s => s.replace(/\s+/g,'')},
  ];
  let lastResult = '';
  function convertAll(){
    const txt = document.getElementById('input').value;
    const grid = document.getElementById('case-grid');
    grid.innerHTML = cases.map((c,i) => `<button class="case-btn" onclick="selectCase(${i})"><div class="case-label">${c.label}</div><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.fn(txt||'Preview text').slice(0,30)}</div></button>`).join('');
  }
  function selectCase(i){
    const txt = document.getElementById('input').value;
    lastResult = cases[i].fn(txt);
    const out = document.getElementById('output');
    out.textContent = lastResult;
    out.style.display = 'block';
  }
  function copyResult(){if(!lastResult)return;navigator.clipboard.writeText(lastResult);const b=event.target;b.textContent='Copied!';setTimeout(()=>b.textContent='Copy Result',1500);}
  convertAll();
  
</script>
<script src="common.js"></script>
</body>
</html>
