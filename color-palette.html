<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Generator — JustTools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
    :root { --bg: #0a0a0a; --surface: #111; --surface2: #161616; --border: #1e1e1e; --border-bright: #2e2e2e; --text: #f0f0f0; --muted: #666; --accent: #e8ff47; --accent-dim: rgba(232,255,71,0.08); --blue: #79c0ff; --green: #3fb950; --red: #ff7b72; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
    #cursor-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
    #cursor-ring { width: 28px; height: 28px; border: 1px solid rgba(232,255,71,0.4); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: left 0.12s ease, top 0.12s ease; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #666; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.85); backdrop-filter: blur(12px); }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-back { font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: var(--text); }
    .container { max-width: 860px; margin: 0 auto; padding: 60px 40px; }
    .tool-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 12px; }
    .tool-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 52px; line-height: 1.05; margin-bottom: 16px; }
    .tool-desc { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 40px; max-width: 520px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .btn { background: var(--accent); color: #000; border: none; padding: 12px 28px; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; transition: all 0.2s; }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; transform: none; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; transition: all 0.2s; }
    .btn-ghost:hover { border-color: var(--border-bright); color: var(--text); }
    textarea, input[type=text], input[type=number], select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
    textarea:focus, input:focus, select:focus { border-color: var(--border-bright); }
    textarea { resize: vertical; }
    label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 8px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .col { flex: 1; min-width: 200px; }
    @media(max-width:640px) { nav { padding: 16px 20px; } .container { padding: 40px 16px; } .tool-title { font-size: 36px; } }
    .palette-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-radius:12px;overflow:hidden;margin:20px 0;height:120px;} .swatch{flex:1;display:flex;align-items:flex-end;padding:10px;transition:flex 0.3s;} .swatch:hover{flex:2;} .swatch-hex{font-size:10px;color:rgba(0,0,0,0.6);font-weight:700;background:rgba(255,255,255,0.3);padding:2px 6px;border-radius:4px;} .scheme-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;} .scheme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:6px;font-size:12px;transition:all 0.2s;} .scheme-btn.active{border-color:var(--accent);color:var(--accent);} .color-codes{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}  .code-block{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;} .code-hex{font-size:13px;font-weight:700;} .code-label{font-size:10px;color:var(--muted);margin-top:4px;}
  </style>
</head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">📊 Data</div>
  <h1 class="tool-title">Color<br>Palette</h1>
  <p class="tool-desc">Generate beautiful color palettes. Pick a base color and get complementary, analogous, triadic, and more.</p>
  
  <div class="card">
    <div class="row" style="align-items:flex-end;margin-bottom:20px">
      <div class="col"><label>Base Color</label><input type="color" id="base-color" value="#e8ff47" oninput="generatePalette()" style="height:44px;padding:4px"></div>
      <div class="col"><label>Scheme</label>
        <div class="scheme-row" id="scheme-row">
          <button class="scheme-btn active" onclick="setScheme('complementary',this)">Complementary</button>
          <button class="scheme-btn" onclick="setScheme('analogous',this)">Analogous</button>
          <button class="scheme-btn" onclick="setScheme('triadic',this)">Triadic</button>
          <button class="scheme-btn" onclick="setScheme('monochromatic',this)">Monochromatic</button>
          <button class="scheme-btn" onclick="setScheme('split',this)">Split</button>
        </div>
      </div>
    </div>
    <div class="palette-grid" id="palette-grid"></div>
    <div class="color-codes" id="color-codes"></div>
    <button class="btn-ghost" style="margin-top:16px" onclick="copyPaletteCSS()">Copy as CSS Variables</button>
  </div>
</div>
<script>
  const dot = document.getElementById('cursor-dot'), ring = document.getElementById('cursor-ring');
  document.addEventListener('mousemove', e => { dot.style.left=e.clientX+'px'; dot.style.top=e.clientY+'px'; setTimeout(()=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';},80); });
  
  let currentScheme='complementary';
  function setScheme(s,btn){currentScheme=s;document.querySelectorAll('.scheme-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');generatePalette();}
  function hexToHSL(hex){let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;if(max===min){h=s=0;}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}return[Math.round(h*360),Math.round(s*100),Math.round(l*100)];}
  function hslToHex(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};return '#'+f(0)+f(8)+f(4);}
  function generatePalette(){
    const hex=document.getElementById('base-color').value;
    const [h,s,l]=hexToHSL(hex);
    let colors=[];
    if(currentScheme==='complementary')colors=[hex,hslToHex((h+30)%360,s,l),hslToHex((h+60)%360,s,l),hslToHex((h+180)%360,s,l),hslToHex((h+210)%360,s,l)];
    else if(currentScheme==='analogous')colors=[hslToHex((h-40+360)%360,s,l),hslToHex((h-20+360)%360,s,l),hex,hslToHex((h+20)%360,s,l),hslToHex((h+40)%360,s,l)];
    else if(currentScheme==='triadic')colors=[hex,hslToHex((h+60)%360,s,l),hslToHex((h+120)%360,s,l),hslToHex((h+180)%360,s,l),hslToHex((h+240)%360,s,l)];
    else if(currentScheme==='monochromatic')colors=[hslToHex(h,s,Math.max(10,l-30)),hslToHex(h,s,Math.max(10,l-15)),hex,hslToHex(h,s,Math.min(90,l+15)),hslToHex(h,s,Math.min(90,l+30))];
    else colors=[hex,hslToHex((h+150)%360,s,l),hslToHex((h+180)%360,s,l),hslToHex((h+210)%360,s,l),hslToHex((h+330)%360,s,l)];
    document.getElementById('palette-grid').innerHTML=colors.map(c=>`<div class="swatch" style="background:${c}" onclick="navigator.clipboard.writeText('${c}')"><span class="swatch-hex">${c}</span></div>`).join('');
    document.getElementById('color-codes').innerHTML=colors.map((c,i)=>`<div class="code-block"><div class="code-hex" style="color:${c}">${c}</div><div class="code-label">Color ${i+1}</div></div>`).join('');
  }
  function copyPaletteCSS(){const swatches=document.querySelectorAll('.swatch');let css=':root {\n';swatches.forEach((s,i)=>{css+=`  --color-${i+1}: ${s.style.background};\n`;});css+='}';navigator.clipboard.writeText(css);const b=event.target;b.textContent='Copied!';setTimeout(()=>b.textContent='Copy as CSS Variables',1500);}
  generatePalette();
  
</script>
</body>
</html>
