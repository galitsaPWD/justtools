<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typography Tester — JustTools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
    :root { --bg: #0a0a0a; --surface: #111; --surface2: #161616; --border: #1e1e1e; --border-bright: #2e2e2e; --text: #f0f0f0; --muted: #666; --accent: #e8ff47; --accent-dim: rgba(232,255,71,0.08); --blue: #79c0ff; --green: #3fb950; --red: #ff7b72; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
    #cursor-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
    #cursor-ring { width: 28px; height: 28px; border: 1px solid rgba(232,255,71,0.4); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: left 0.12s ease, top 0.12s ease; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #666; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.85); backdrop-filter: blur(12px); }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-back { font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: var(--text); }
    .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }
    .tool-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 12px; }
    .tool-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 52px; line-height: 1.05; margin-bottom: 16px; }
    .tool-desc { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 40px; max-width: 520px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .btn { background: var(--accent); color: #000; border: none; padding: 12px 28px; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; transition: all 0.2s; }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; transition: all 0.2s; }
    .btn-ghost:hover { border-color: var(--border-bright); color: var(--text); }
    input[type=text], input[type=number], select, textarea { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
    input:focus, select:focus, textarea:focus { border-color: var(--border-bright); }
    label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 8px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .col { flex: 1; min-width: 180px; }
    @media(max-width:640px) { nav { padding: 16px 20px; } .container { padding: 40px 16px; } .tool-title { font-size: 36px; } }
    
  .type-preview { min-height: 200px; padding: 40px; background: var(--surface2); border-radius: 12px; margin-bottom: 24px; border: 1px solid var(--border); display: flex; align-items: center; word-break: break-word; transition: all 0.3s; }
  .slider-row { display: grid; grid-template-columns: 140px 1fr 56px; gap: 12px; align-items: center; margin-bottom: 12px; }
  .slider-label { font-size: 11px; color: var(--muted); }
  input[type=range] { accent-color: var(--accent); }
  .slider-val { font-size: 12px; color: var(--text); text-align: right; font-family: 'DM Mono', monospace; }
  .font-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; max-height: 200px; overflow-y: auto; margin-bottom: 16px; }
  .font-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 8px 12px; border-radius: 6px; font-size: 12px; transition: all 0.2s; text-align: left; }
  .font-btn.active { border-color: var(--accent); color: var(--accent); }
  .css-output { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 12px; color: var(--accent); word-break: break-all; margin-top: 16px; }
  
  </style>
</head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">🎨 Design</div>
  <h1 class="tool-title">Typography<br>Tester</h1>
  <p class="tool-desc">Preview any Google Font instantly. Test size, weight, line height and letter spacing in real time.</p>
  
  <div class="type-preview" id="type-preview">
    <div id="preview-text" contenteditable="true" style="outline:none;width:100%">The quick brown fox jumps over the lazy dog.</div>
  </div>
  <div class="card">
    <label style="margin-bottom:10px">Font Family</label>
    <input type="text" id="font-search" placeholder="Search Google Fonts..." oninput="filterFonts()" style="margin-bottom:12px">
    <div class="font-grid" id="font-grid"></div>
    <div class="slider-row"><span class="slider-label">Font Size</span><input type="range" id="font-size" min="12" max="120" value="42" oninput="render()"><span class="slider-val" id="v-size">42px</span></div>
    <div class="slider-row"><span class="slider-label">Font Weight</span><input type="range" id="font-weight" min="100" max="900" step="100" value="700" oninput="render()"><span class="slider-val" id="v-weight">700</span></div>
    <div class="slider-row"><span class="slider-label">Line Height</span><input type="range" id="line-height" min="0.8" max="3" step="0.1" value="1.2" oninput="render()"><span class="slider-val" id="v-lh">1.2</span></div>
    <div class="slider-row"><span class="slider-label">Letter Spacing</span><input type="range" id="letter-spacing" min="-5" max="20" step="0.5" value="0" oninput="render()"><span class="slider-val" id="v-ls">0px</span></div>
    <div class="row" style="margin-top:12px">
      <div class="col"><label>Text Color</label><input type="color" id="text-color" value="#f0f0f0" oninput="render()" style="height:40px"></div>
      <div class="col"><label>Background</label><input type="color" id="bg-color" value="#161616" oninput="document.getElementById('type-preview').style.background=this.value" style="height:40px"></div>
    </div>
    <div class="css-output" id="css-output"></div>
    <button class="btn" style="margin-top:14px" onclick="copyCSS()">Copy CSS</button>
  </div>
</div>
<script>
  const dot=document.getElementById('cursor-dot'),ring=document.getElementById('cursor-ring');
  document.addEventListener('mousemove',e=>{dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';setTimeout(()=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';},80);});
  
  const FONTS=['Inter','Roboto','Open Sans','Lato','Montserrat','Oswald','Raleway','Poppins','Playfair Display','Merriweather','Ubuntu','Nunito','Fira Code','JetBrains Mono','Space Grotesk','DM Sans','Syne','Outfit','Plus Jakarta Sans','Fraunces','Unbounded','Cabinet Grotesk','Geist','Bricolage Grotesque','Clash Display'];
  let currentFont='Syne', loadedFonts=new Set();
  function filterFonts(){const q=document.getElementById('font-search').value.toLowerCase();renderFontGrid(FONTS.filter(f=>f.toLowerCase().includes(q)));}
  function renderFontGrid(list){
    document.getElementById('font-grid').innerHTML=(list||FONTS).map(f=>`<button class="font-btn ${f===currentFont?'active':''}" onclick="selectFont('${f}')">${f}</button>`).join('');
  }
  function selectFont(f){
    currentFont=f;
    if(!loadedFonts.has(f)){const link=document.createElement('link');link.href=`https://fonts.googleapis.com/css2?family=${f.replace(/ /g,'+')}:wght@100;300;400;500;700;900&display=swap`;link.rel='stylesheet';document.head.appendChild(link);loadedFonts.add(f);}
    renderFontGrid();render();
  }
  function render(){
    const size=document.getElementById('font-size').value;
    const weight=document.getElementById('font-weight').value;
    const lh=document.getElementById('line-height').value;
    const ls=document.getElementById('letter-spacing').value;
    const color=document.getElementById('text-color').value;
    document.getElementById('v-size').textContent=size+'px';
    document.getElementById('v-weight').textContent=weight;
    document.getElementById('v-lh').textContent=lh;
    document.getElementById('v-ls').textContent=ls+'px';
    const el=document.getElementById('preview-text');
    el.style.cssText=`font-family:'${currentFont}',sans-serif;font-size:${size}px;font-weight:${weight};line-height:${lh};letter-spacing:${ls}px;color:${color};outline:none;width:100%`;
    document.getElementById('css-output').textContent=`font-family: '${currentFont}', sans-serif;\nfont-size: ${size}px;\nfont-weight: ${weight};\nline-height: ${lh};\nletter-spacing: ${ls}px;`;
  }
  function copyCSS(){navigator.clipboard.writeText(document.getElementById('css-output').textContent);const b=event.target;b.textContent='Copied!';setTimeout(()=>b.textContent='Copy CSS',1500);}
  selectFont('Syne');renderFontGrid();render();
  
</script>
</body>
</html>
