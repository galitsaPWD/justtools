<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Shadow Generator — JustTools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
    :root { --bg: #0a0a0a; --surface: #111; --surface2: #161616; --border: #1e1e1e; --border-bright: #2e2e2e; --text: #f0f0f0; --muted: #666; --accent: #e8ff47; --accent-dim: rgba(232,255,71,0.08); --blue: #79c0ff; --green: #3fb950; --red: #ff7b72; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
    #cursor-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
    #cursor-ring { width: 28px; height: 28px; border: 1px solid rgba(232,255,71,0.4); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: left 0.12s ease, top 0.12s ease; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #666; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.85); backdrop-filter: blur(12px); }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-back { font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: var(--text); }
    .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }
    .tool-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 12px; }
    .tool-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 52px; line-height: 1.05; margin-bottom: 16px; }
    .tool-desc { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 40px; max-width: 520px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .btn { background: var(--accent); color: #000; border: none; padding: 12px 28px; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; transition: all 0.2s; }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; transition: all 0.2s; }
    .btn-ghost:hover { border-color: var(--border-bright); color: var(--text); }
    input[type=text], input[type=number], select, textarea { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
    input:focus, select:focus, textarea:focus { border-color: var(--border-bright); }
    label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 8px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .col { flex: 1; min-width: 180px; }
    @media(max-width:640px) { nav { padding: 16px 20px; } .container { padding: 40px 16px; } .tool-title { font-size: 36px; } }
    
  .shadow-preview-wrap { display: flex; align-items: center; justify-content: center; padding: 60px; background: #ffffff; border-radius: 12px; margin-bottom: 24px; border: 1px solid var(--border); transition: background 0.2s; }
  .shadow-box { width: 160px; height: 160px; background: #ffffff; border-radius: 12px; transition: box-shadow 0.2s, background 0.2s; }
  .slider-row { display: grid; grid-template-columns: 120px 1fr 48px; gap: 12px; align-items: center; margin-bottom: 12px; }
  .slider-label { font-size: 11px; color: var(--muted); }
  input[type=range] { width: 100%; accent-color: var(--accent); background: transparent; }
  .slider-val { font-size: 12px; color: var(--text); text-align: right; }
  .shadow-layers { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .layer-item { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--muted); }
  .layer-active { border-color: var(--accent); color: var(--text); }
  .css-output { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-size: 12px; color: var(--accent); word-break: break-all; margin-top: 16px; }
  
  </style>
</head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">🎨 Design</div>
  <h1 class="tool-title">Box Shadow<br>Generator</h1>
  <p class="tool-desc">Build CSS box shadows visually with live preview. Add multiple layers and copy the CSS.</p>
  
  <div class="shadow-preview-wrap">
    <div class="shadow-box" id="shadow-box"></div>
  </div>
  <div class="card">
    <div class="shadow-layers" id="shadow-layers"></div>
    <button class="btn-ghost" style="font-size:12px;margin-bottom:20px" onclick="addLayer()">+ Add Layer</button>
    <div class="slider-row"><span class="slider-label">Horizontal</span><input type="range" id="s-x" min="-50" max="50" value="4" oninput="updateSlider('x',this.value)"><span class="slider-val" id="v-x">4px</span></div>
    <div class="slider-row"><span class="slider-label">Vertical</span><input type="range" id="s-y" min="-50" max="50" value="4" oninput="updateSlider('y',this.value)"><span class="slider-val" id="v-y">4px</span></div>
    <div class="slider-row"><span class="slider-label">Blur</span><input type="range" id="s-b" min="0" max="100" value="16" oninput="updateSlider('b',this.value)"><span class="slider-val" id="v-b">16px</span></div>
    <div class="slider-row"><span class="slider-label">Spread</span><input type="range" id="s-s" min="-20" max="40" value="0" oninput="updateSlider('s',this.value)"><span class="slider-val" id="v-s">0px</span></div>
    <div class="slider-row"><span class="slider-label">Opacity</span><input type="range" id="s-o" min="0" max="100" value="30" oninput="updateSlider('o',this.value)"><span class="slider-val" id="v-o">30%</span></div>
    <div class="row" style="margin-top:12px">
      <div class="col"><label>Color</label><input type="color" id="s-color" value="#000000" oninput="render()" style="height:44px"></div>
      <div class="col"><label>Inset</label><select id="s-inset" onchange="render()"><option value="">No</option><option value="inset">Yes</option></select></div>
      <div class="col"><label>Canvas</label><input type="color" id="canvas-color" value="#ffffff" oninput="document.querySelector('.shadow-preview-wrap').style.background=this.value" style="height:44px"></div>
      <div class="col"><label>Box</label><input type="color" id="box-color" value="#ffffff" oninput="document.getElementById('shadow-box').style.background=this.value" style="height:44px"></div>
    </div>
    <div class="css-output" id="css-output"></div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn" onclick="copyCSS()">Copy CSS</button>
      <button class="btn-ghost" onclick="resetLayers()">Reset</button>
    </div>
  </div>
</div>
<script>
  const dot=document.getElementById('cursor-dot'),ring=document.getElementById('cursor-ring');
  document.addEventListener('mousemove',e=>{dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';setTimeout(()=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';},80);});
  
  let layers=[{x:4,y:4,b:16,s:0,o:30,color:'#000000',inset:''}], activeLayer=0;
  function addLayer(){layers.push({x:0,y:8,b:24,s:0,o:20,color:'#000000',inset:''});activeLayer=layers.length-1;syncSliders();renderLayers();render();}
  function resetLayers(){layers=[{x:4,y:4,b:16,s:0,o:30,color:'#000000',inset:''}];activeLayer=0;syncSliders();renderLayers();render();}
  function selectLayer(i){activeLayer=i;syncSliders();renderLayers();}
  function deleteLayer(i){if(layers.length===1)return;layers.splice(i,1);activeLayer=Math.min(activeLayer,layers.length-1);syncSliders();renderLayers();render();}
  function syncSliders(){
    const l=layers[activeLayer];
    document.getElementById('s-x').value=l.x; document.getElementById('v-x').textContent=l.x+'px';
    document.getElementById('s-y').value=l.y; document.getElementById('v-y').textContent=l.y+'px';
    document.getElementById('s-b').value=l.b; document.getElementById('v-b').textContent=l.b+'px';
    document.getElementById('s-s').value=l.s; document.getElementById('v-s').textContent=l.s+'px';
    document.getElementById('s-o').value=l.o; document.getElementById('v-o').textContent=l.o+'%';
    document.getElementById('s-color').value=l.color;
    document.getElementById('s-inset').value=l.inset;
  }
  function updateSlider(k,v){layers[activeLayer][k]=+v;document.getElementById('v-'+k).textContent=v+(k==='o'?'%':'px');render();}
  function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a/100})`;}
  function layerToCSS(l){return `${l.inset?'inset ':''} ${l.x}px ${l.y}px ${l.b}px ${l.s}px ${hexToRgba(l.color,l.o)}`;}
  function render(){
    const css=layers.map(layerToCSS).join(', ');
    document.getElementById('shadow-box').style.boxShadow=css;
    document.getElementById('css-output').textContent='box-shadow: '+css+';';
    renderLayers();
  }
  function renderLayers(){
    document.getElementById('shadow-layers').innerHTML=layers.map((l,i)=>`
      <div class="layer-item ${i===activeLayer?'layer-active':''}" onclick="selectLayer(${i})">
        <div style="width:14px;height:14px;border-radius:3px;background:${hexToRgba(l.color,l.o)};flex-shrink:0"></div>
        Layer ${i+1} — ${l.x}px ${l.y}px ${l.b}px
        ${layers.length>1?`<button class="stop-del" style="margin-left:auto;background:none;border:none;color:var(--muted);font-size:14px" onclick="event.stopPropagation();deleteLayer(${i})">×</button>`:''}
      </div>`).join('');
  }
  function copyCSS(){navigator.clipboard.writeText(document.getElementById('css-output').textContent);const b=event.target;b.textContent='Copied!';setTimeout(()=>b.textContent='Copy CSS',1500);}
  document.getElementById('s-color').addEventListener('input',function(){layers[activeLayer].color=this.value;render();});
  document.getElementById('s-inset').addEventListener('change',function(){layers[activeLayer].inset=this.value;render();});
  syncSliders();renderLayers();render();
  
</script>
</body>
</html>
