<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Free online word counter — no signup, no account needed. Count words, characters, reading time instantly in your browser.">
<title>URL Encoder — JustTools</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--bg:#0a0a0a;--surface:#111;--border:#1e1e1e;--border-bright:#2e2e2e;--text:#f0f0f0;--muted:#666;--accent:#e8ff47;--accent-dim:rgba(232,255,71,0.1);--green:#47ff8a;--red:#ff6b6b;--blue:#79c0ff}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
  nav{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;border-bottom:1px solid var(--border);background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
  .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;text-decoration:none;color:var(--text)}
  .nav-logo span{color:var(--accent)}
  .nav-back{color:var(--muted);font-size:13px;text-decoration:none;transition:color 0.2s}
  .nav-back:hover{color:var(--text)}
  .container{max-width:860px;margin:0 auto;padding:64px 24px}
  .tool-label{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
  .tool-title{font-family:'Syne',sans-serif;font-weight:800;font-size:48px;letter-spacing:-2px;line-height:1;margin-bottom:12px}
  .tool-desc{color:var(--muted);font-size:14px;margin-bottom:40px}

  .panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .panel-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .panel-label span{color:var(--accent);font-size:11px}
  textarea.panel{width:100%;min-height:200px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;line-height:1.7;resize:vertical;outline:none;transition:border-color 0.2s}
  textarea.panel:focus{border-color:var(--border-bright)}

  .action-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;align-items:center}
  .action-btn{padding:10px 22px;border-radius:8px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s}
  .action-btn.primary{background:var(--accent);color:#000}
  .action-btn.primary:hover{opacity:0.85;transform:translateY(-1px)}
  .action-btn.green{background:var(--green);color:#000}
  .action-btn.green:hover{opacity:0.85}
  .action-btn.secondary{background:var(--surface);border:1px solid var(--border);color:var(--muted)}
  .action-btn.secondary:hover{color:var(--text);border-color:var(--border-bright)}
  .mode-toggle{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-left:auto}
  .mode-opt{padding:8px 14px;font-size:11px;color:var(--muted);cursor:pointer;border:none;background:none;font-family:'DM Mono',monospace;transition:all 0.2s;white-space:nowrap}
  .mode-opt.active{background:var(--accent-dim);color:var(--accent)}
  .mode-hint{font-size:11px;color:var(--muted);padding:0 4px}

  .url-parser{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:32px}
  .url-parser-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:20px;color:var(--text)}
  .url-input-row{display:flex;gap:8px;margin-bottom:20px}
  .url-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 16px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s}
  .url-input:focus{border-color:var(--border-bright)}
  .parse-btn{background:var(--accent);color:#000;border:none;padding:10px 20px;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
  .url-parts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .url-part{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px}
  .url-part-name{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px}
  .url-part-val{font-size:13px;color:var(--blue);word-break:break-all}
  .url-part-val.empty{color:var(--muted);font-style:italic}

  .params-table{width:100%;border-collapse:collapse;margin-top:12px}
  .params-table th{text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;padding:8px 12px;border-bottom:1px solid var(--border)}
  .params-table td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;word-break:break-all}
  .params-table tr:last-child td{border-bottom:none}
  .param-key{color:var(--accent)}
  .param-val{color:var(--green)}

  @media(max-width:600px){.panels{grid-template-columns:1fr}.url-parts{grid-template-columns:1fr}nav{padding:16px 20px}.container{padding:40px 16px}}
  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 100px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  * { scrollbar-width: thin; scrollbar-color: var(--border-bright) var(--bg); }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">🌐 Developer</div>
  <h1 class="tool-title">URL Encoder<br>/ Decoder</h1>
  <p class="tool-desc">Encode special characters for safe URL use, decode encoded URLs, and parse URL components.</p>

  <div class="panels">
    <div>
      <div class="panel-label">Input <span id="in-len"></span></div>
      <textarea class="panel" id="input-text" placeholder="Paste a URL or text to encode/decode..." oninput="updateLen()"></textarea>
    </div>
    <div>
      <div class="panel-label">Output <span id="out-len"></span></div>
      <textarea class="panel" id="output-text" placeholder="Result appears here..." readonly></textarea>
    </div>
  </div>

  <div class="action-row">
    <button class="action-btn primary" onclick="smartEncode()">⚡ Encode</button>
    <button class="action-btn green" onclick="smartDecode()">Decode</button>
    <button class="action-btn secondary" onclick="swapPanels()">⇄ Swap</button>
    <button class="action-btn secondary" onclick="copyOutput()">Copy</button>
    <button class="action-btn secondary" onclick="clearAll()">Clear</button>
    <div class="mode-toggle" title="Full URL keeps :// and /. Component encodes everything (for query params).">
      <button class="mode-opt active" id="mode-full" onclick="setMode('full')">Full URL</button>
      <button class="mode-opt" id="mode-component" onclick="setMode('component')">Query Param</button>
    </div>
  </div>

  <div class="url-parser">
    <div class="url-parser-title">🔍 URL Parser</div>
    <div class="url-input-row">
      <input class="url-input" id="url-parse-input" placeholder="https://example.com/path?key=value&foo=bar#section" oninput="parseURL()">
    </div>
    <div class="url-parts" id="url-parts"></div>
    <div id="params-section" style="margin-top:16px;display:none">
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">Query Parameters</div>
      <table class="params-table" id="params-table"><thead><tr><th>Key</th><th>Value</th></tr></thead><tbody id="params-body"></tbody></table>
    </div>
  </div>
</div>
<script>
  function updateLen() {
    const v = document.getElementById('input-text').value;
    document.getElementById('in-len').textContent = v.length ? v.length+' chars' : '';
  }
  function setOutput(val) {
    document.getElementById('output-text').value = val;
    document.getElementById('out-len').textContent = val.length ? val.length+' chars' : '';
  }
  let encMode = 'full';
  function setMode(m) {
    encMode = m;
    document.getElementById('mode-full').classList.toggle('active', m==='full');
    document.getElementById('mode-component').classList.toggle('active', m==='component');
  }
  function smartEncode() {
    const input = document.getElementById('input-text').value;
    try { setOutput(encMode === 'full' ? encodeURI(input) : encodeURIComponent(input)); }
    catch(e) { setOutput('Error: ' + e.message); }
  }
  function smartDecode() {
    const input = document.getElementById('input-text').value.trim();
    try { setOutput(encMode === 'full' ? decodeURI(input) : decodeURIComponent(input)); }
    catch(e) { setOutput('Error: Invalid encoded string — try switching to Query Param mode'); }
  }
  function swapPanels() {
    const b = document.getElementById('output-text').value;
    document.getElementById('input-text').value = b;
    document.getElementById('output-text').value = '';
    updateLen(); document.getElementById('out-len').textContent = '';
  }
  function copyOutput() { navigator.clipboard.writeText(document.getElementById('output-text').value); }
  function clearAll() { document.getElementById('input-text').value=''; document.getElementById('output-text').value=''; document.getElementById('in-len').textContent=''; document.getElementById('out-len').textContent=''; }

  function parseURL() {
    const raw = document.getElementById('url-parse-input').value.trim();
    const container = document.getElementById('url-parts');
    if (!raw) { container.innerHTML=''; document.getElementById('params-section').style.display='none'; return; }
    try {
      const u = new URL(raw.startsWith('http')?raw:'https://'+raw);
      const parts = [
        {name:'Protocol', val:u.protocol},
        {name:'Host', val:u.hostname},
        {name:'Port', val:u.port||'(default)'},
        {name:'Path', val:u.pathname},
        {name:'Query', val:u.search||'(none)'},
        {name:'Hash', val:u.hash||'(none)'},
      ];
      container.innerHTML = parts.map(p =>
        `<div class="url-part"><div class="url-part-name">${p.name}</div><div class="url-part-val ${p.val.startsWith('(')?'empty':''}">${p.val}</div></div>`
      ).join('');
      const params = [...u.searchParams.entries()];
      if (params.length) {
        document.getElementById('params-section').style.display='block';
        document.getElementById('params-body').innerHTML = params.map(([k,v]) =>
          `<tr><td class="param-key">${k}</td><td class="param-val">${v}</td></tr>`
        ).join('');
      } else { document.getElementById('params-section').style.display='none'; }
    } catch(e) { container.innerHTML = `<div style="color:var(--red);font-size:13px;grid-column:1/-1">Invalid URL</div>`; document.getElementById('params-section').style.display='none'; }
  }

  </script>
<script src="common.js"></script>
</body>
</html>
