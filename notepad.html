<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notepad — JustTools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <style>
    
    #note{width:100%;min-height:60vh;background:transparent;border:none;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;line-height:1.9;resize:none;outline:none;padding:0;} .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);} .note-stats{font-size:11px;color:var(--muted);} .saved-indicator{font-size:11px;color:var(--green);opacity:0;transition:opacity 0.3s;}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">⏱ Productivity</div>
  <h1 class="tool-title">Quick<br>Notepad</h1>
  <p class="tool-desc">A distraction-free notepad that saves automatically in your browser. Your notes never leave your device.</p>
  
  <div class="toolbar">
    <div class="note-stats" id="note-stats">0 words · 0 chars</div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="saved-indicator" id="saved-indicator">✓ Saved</span>
      <button class="btn-ghost" onclick="downloadNote()">⬇ Download</button>
      <button class="btn-ghost" onclick="clearNote()" style="color:var(--red);border-color:var(--red)">Clear</button>
    </div>
  </div>
  <textarea id="note" placeholder="Start typing... your notes are saved automatically." oninput="onType()"></textarea>
</div>
<script>
  let saveTimer;
  const note = document.getElementById('note');
  note.value = localStorage.getItem('jt-notepad') || '';
  updateStats();
  function onType(){
    updateStats();
    clearTimeout(saveTimer);
    saveTimer=setTimeout(saveNote, 600);
  }
  function saveNote(){
    localStorage.setItem('jt-notepad', note.value);
    const ind=document.getElementById('saved-indicator');
    ind.style.opacity='1';
    setTimeout(()=>ind.style.opacity='0',1500);
  }
  function updateStats(){
    const txt=note.value;
    const words=txt.trim()?txt.trim().split(/\s+/).length:0;
    document.getElementById('note-stats').textContent=`${words} words · ${txt.length} chars`;
  }
  function downloadNote(){
    const a=document.createElement('a');
    a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(note.value);
    a.download='note.txt';a.click();
  }
  function clearNote(){if(confirm('Clear all notes?')){note.value='';saveNote();updateStats();}}
  
</script>
<script src="common.js"></script>
</body>
</html>
