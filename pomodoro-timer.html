<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Free online word counter — no signup, no account needed. Count words, characters, reading time instantly in your browser.">
<title>Pomodoro Timer — JustTools</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0a;--surface:#111;--border:#1e1e1e;--border-bright:#2e2e2e;--text:#f0f0f0;--muted:#666;--accent:#e8ff47;--accent-dim:rgba(232,255,71,0.1);--red:#ff6b6b;--green:#47ff8a;--blue:#47b8ff}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
  nav{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;border-bottom:1px solid var(--border);background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
  .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;text-decoration:none;color:var(--text)}
  .nav-logo span{color:var(--accent)}
  .nav-back{color:var(--muted);font-size:13px;text-decoration:none;transition:color 0.2s}
  .nav-back:hover{color:var(--text)}
  .container{max-width:600px;margin:0 auto;padding:64px 24px}
  .tool-label{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
  .tool-title{font-family:'Syne',sans-serif;font-weight:800;font-size:48px;letter-spacing:-2px;line-height:1;margin-bottom:12px}
  .tool-desc{color:var(--muted);font-size:14px;margin-bottom:48px}

  .mode-tabs{display:flex;gap:8px;margin-bottom:40px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px}
  .mode-tab{flex:1;padding:10px;border:none;background:none;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border-radius:6px;transition:all 0.2s}
  .mode-tab.active{background:var(--accent);color:#000}

  .timer-ring-wrap{display:flex;justify-content:center;margin-bottom:40px;position:relative}
  svg.ring{transform:rotate(-90deg)}
  .ring-bg{fill:none;stroke:var(--border);stroke-width:6}
  .ring-fill{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s linear, stroke 0.5s}
  .timer-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
  .timer-display{font-family:'Syne',sans-serif;font-weight:800;font-size:56px;letter-spacing:-3px;line-height:1}
  .timer-mode-label{font-size:12px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.1em}

  .controls{display:flex;gap:12px;justify-content:center;margin-bottom:40px}
  .ctrl-btn{padding:14px 32px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;cursor:pointer;transition:all 0.2s;border:none}
  .ctrl-btn.start{background:var(--accent);color:#000}
  .ctrl-btn.start:hover{opacity:0.85;transform:translateY(-1px)}
  .ctrl-btn.reset{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
  .ctrl-btn.reset:hover{color:var(--text);border-color:var(--border-bright)}
  .ctrl-btn.skip{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
  .ctrl-btn.skip:hover{color:var(--accent);border-color:var(--accent)}

  .sessions-row{display:flex;gap:8px;justify-content:center;margin-bottom:40px}
  .session-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background 0.3s}
  .session-dot.done{background:var(--accent)}
  .session-dot.current{background:var(--accent);box-shadow:0 0 8px var(--accent)}

  .settings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:40px}
  .setting-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
  .setting-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
  .setting-val{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--accent);margin-bottom:8px}
  .setting-btns{display:flex;gap:6px;justify-content:center}
  .setting-btn{background:none;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
  .setting-btn:hover{border-color:var(--accent);color:var(--accent)}

  .stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
  .stat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--text)}
  .stat-label{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em}

  @media(max-width:600px){nav{padding:16px 20px}.container{padding:40px 16px}.timer-display{font-size:42px}.settings-grid{grid-template-columns:1fr 1fr}}
  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 100px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  * { scrollbar-width: thin; scrollbar-color: var(--border-bright) var(--bg); }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">⏱️ Productivity</div>
  <h1 class="tool-title">Pomodoro<br>Timer</h1>
  <p class="tool-desc">Focus sessions with automatic breaks. Stay in flow, get more done.</p>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('focus',this)">Focus</button>
    <button class="mode-tab" onclick="setMode('short',this)">Short Break</button>
    <button class="mode-tab" onclick="setMode('long',this)">Long Break</button>
  </div>

  <div class="timer-ring-wrap">
    <svg class="ring" width="240" height="240" viewBox="0 0 240 240">
      <circle class="ring-bg" cx="120" cy="120" r="108"/>
      <circle class="ring-fill" id="ring-fill" cx="120" cy="120" r="108" stroke-dasharray="678.6" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-center">
      <div class="timer-display" id="timer-display">25:00</div>
      <div class="timer-mode-label" id="mode-label">Focus</div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn reset" onclick="resetTimer()">Reset</button>
    <button class="ctrl-btn start" id="start-btn" onclick="toggleTimer()">Start</button>
    <button class="ctrl-btn skip" onclick="skipSession()">Skip →</button>
  </div>

  <div class="sessions-row" id="sessions-row"></div>

  <div class="settings-grid">
    <div class="setting-card">
      <div class="setting-label">Focus</div>
      <div class="setting-val" id="focus-val">25</div>
      <div class="setting-btns">
        <button class="setting-btn" onclick="adjustSetting('focus',-1)">−</button>
        <button class="setting-btn" onclick="adjustSetting('focus',1)">+</button>
      </div>
    </div>
    <div class="setting-card">
      <div class="setting-label">Short Break</div>
      <div class="setting-val" id="short-val">5</div>
      <div class="setting-btns">
        <button class="setting-btn" onclick="adjustSetting('short',-1)">−</button>
        <button class="setting-btn" onclick="adjustSetting('short',1)">+</button>
      </div>
    </div>
    <div class="setting-card">
      <div class="setting-label">Long Break</div>
      <div class="setting-val" id="long-val">15</div>
      <div class="setting-btns">
        <button class="setting-btn" onclick="adjustSetting('long',-1)">−</button>
        <button class="setting-btn" onclick="adjustSetting('long',1)">+</button>
      </div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-completed">0</div><div class="stat-label">Completed</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-focus">0m</div><div class="stat-label">Focus Time</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-streak">0</div><div class="stat-label">Streak</div></div>
  </div>
</div>
<script>
  const CIRCUMFERENCE = 2 * Math.PI * 108;
  const settings = { focus: 25, short: 5, long: 15 };
  const modes = { focus: 'Focus', short: 'Short Break', long: 'Long Break' };
  let currentMode = 'focus';
  let timeLeft = settings.focus * 60;
  let totalTime = settings.focus * 60;
  let running = false;
  let interval = null;
  let sessionCount = 0;
  let completedPomodoros = 0;
  let totalFocusSeconds = 0;
  let streak = 0;
  const SESSIONS_PER_CYCLE = 4;

  function renderSessions() {
    const row = document.getElementById('sessions-row');
    row.innerHTML = Array.from({length: SESSIONS_PER_CYCLE}, (_,i) => {
      const done = i < completedPomodoros % SESSIONS_PER_CYCLE;
      const current = i === completedPomodoros % SESSIONS_PER_CYCLE && currentMode === 'focus';
      return `<div class="session-dot ${done?'done':''} ${current?'current':''}"></div>`;
    }).join('');
  }

  function updateDisplay() {
    const m = Math.floor(timeLeft/60).toString().padStart(2,'0');
    const s = (timeLeft%60).toString().padStart(2,'0');
    document.getElementById('timer-display').textContent = `${m}:${s}`;
    const pct = timeLeft / totalTime;
    const offset = CIRCUMFERENCE * pct;
    document.getElementById('ring-fill').style.strokeDashoffset = CIRCUMFERENCE - offset;
    const colors = { focus: '#e8ff47', short: '#47ff8a', long: '#47b8ff' };
    document.getElementById('ring-fill').style.stroke = colors[currentMode];
    document.title = `${m}:${s} — ${modes[currentMode]} | JustTools`;
  }

  function toggleTimer() {
    running = !running;
    document.getElementById('start-btn').textContent = running ? 'Pause' : 'Start';
    if (running) {
      interval = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft--;
          if (currentMode === 'focus') totalFocusSeconds++;
          updateDisplay();
          updateStats();
        } else {
          clearInterval(interval); running = false;
          onSessionComplete();
        }
      }, 1000);
    } else {
      clearInterval(interval);
    }
  }

  function onSessionComplete() {
    if (Notification.permission === 'granted') new Notification('JustTools', { body: `${modes[currentMode]} complete!` });
    if (currentMode === 'focus') {
      completedPomodoros++;
      streak++;
      const isLongBreak = completedPomodoros % SESSIONS_PER_CYCLE === 0;
      setMode(isLongBreak ? 'long' : 'short', null);
    } else {
      setMode('focus', null);
    }
    document.getElementById('start-btn').textContent = 'Start';
    renderSessions();
    updateStats();
  }

  function setMode(mode, el) {
    currentMode = mode;
    timeLeft = settings[mode] * 60;
    totalTime = settings[mode] * 60;
    clearInterval(interval); running = false;
    document.getElementById('start-btn').textContent = 'Start';
    document.getElementById('mode-label').textContent = modes[mode];
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    if (el) el.classList.add('active');
    else document.querySelectorAll('.mode-tab')[mode==='focus'?0:mode==='short'?1:2].classList.add('active');
    updateDisplay(); renderSessions();
  }

  function resetTimer() {
    clearInterval(interval); running = false;
    timeLeft = settings[currentMode] * 60;
    totalTime = settings[currentMode] * 60;
    document.getElementById('start-btn').textContent = 'Start';
    updateDisplay();
  }

  function skipSession() { clearInterval(interval); running = false; onSessionComplete(); }

  function adjustSetting(key, delta) {
    settings[key] = Math.max(1, Math.min(60, settings[key] + delta));
    document.getElementById(`${key}-val`).textContent = settings[key];
    if (currentMode === key) { timeLeft = settings[key]*60; totalTime = settings[key]*60; updateDisplay(); }
  }

  function updateStats() {
    document.getElementById('stat-completed').textContent = completedPomodoros;
    const mins = Math.floor(totalFocusSeconds/60);
    document.getElementById('stat-focus').textContent = mins + 'm';
    document.getElementById('stat-streak').textContent = streak;
  }

  if (Notification.permission === 'default') Notification.requestPermission();
  updateDisplay(); renderSessions(); updateStats();
</script>
</body>
</html>
