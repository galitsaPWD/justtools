<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Generator — JustTools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
    :root { --bg: #0a0a0a; --surface: #111; --surface2: #161616; --border: #1e1e1e; --border-bright: #2e2e2e; --text: #f0f0f0; --muted: #666; --accent: #e8ff47; --accent-dim: rgba(232,255,71,0.08); --blue: #79c0ff; --green: #3fb950; --red: #ff7b72; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
    #cursor-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
    #cursor-ring { width: 28px; height: 28px; border: 1px solid rgba(232,255,71,0.4); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: left 0.12s ease, top 0.12s ease; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #666; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.85); backdrop-filter: blur(12px); }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-back { font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: var(--text); }
    .container { max-width: 860px; margin: 0 auto; padding: 60px 40px; }
    .tool-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 12px; }
    .tool-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 52px; line-height: 1.05; margin-bottom: 16px; }
    .tool-desc { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 40px; max-width: 520px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .btn { background: var(--accent); color: #000; border: none; padding: 12px 28px; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; transition: all 0.2s; }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; transform: none; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; transition: all 0.2s; }
    .btn-ghost:hover { border-color: var(--border-bright); color: var(--text); }
    textarea, input[type=text], input[type=number], select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
    textarea:focus, input:focus, select:focus { border-color: var(--border-bright); }
    textarea { resize: vertical; }
    label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 8px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .col { flex: 1; min-width: 200px; }
    @media(max-width:640px) { nav { padding: 16px 20px; } .container { padding: 40px 16px; } .tool-title { font-size: 36px; } }
    .invoice-form{display:grid;gap:16px;} .form-section{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:20px;} .section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;margin-bottom:16px;color:var(--accent);} .items-table{width:100%;border-collapse:collapse;} .items-table th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;padding:8px 0;text-align:left;border-bottom:1px solid var(--border);} .items-table td{padding:8px 4px;border-bottom:1px solid var(--border);} .items-table input{background:transparent;border:none;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:4px;border-radius:4px;} .items-table input:focus{background:var(--surface);outline:none;} .total-row{display:flex;justify-content:flex-end;gap:40px;margin-top:16px;font-size:13px;} .total-label{color:var(--muted);} .total-val{font-family:'Syne',sans-serif;font-weight:800;color:var(--accent);}
  </style>
</head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">📄 Documents</div>
  <h1 class="tool-title">Invoice<br>Generator</h1>
  <p class="tool-desc">Create professional invoices in seconds. Fill in the details and download a clean PDF.</p>
  
  <div class="invoice-form">
    <div class="form-section">
      <div class="section-title">From</div>
      <div class="row"><div class="col"><label>Your Name / Company</label><input type="text" id="from-name" placeholder="Acme Inc."></div><div class="col"><label>Email</label><input type="text" id="from-email" placeholder="hello@acme.com"></div></div>
      <div style="margin-top:10px"><label>Address</label><input type="text" id="from-address" placeholder="123 Main St, City, Country"></div>
    </div>
    <div class="form-section">
      <div class="section-title">To</div>
      <div class="row"><div class="col"><label>Client Name</label><input type="text" id="to-name" placeholder="Client Co."></div><div class="col"><label>Client Email</label><input type="text" id="to-email" placeholder="client@co.com"></div></div>
    </div>
    <div class="form-section">
      <div class="section-title">Invoice Details</div>
      <div class="row">
        <div class="col"><label>Invoice #</label><input type="text" id="inv-num" placeholder="INV-001"></div>
        <div class="col"><label>Date</label><input type="date" id="inv-date"></div>
        <div class="col"><label>Due Date</label><input type="date" id="inv-due"></div>
        <div class="col"><label>Currency</label><select id="currency"><option value="$">USD ($)</option><option value="€">EUR (€)</option><option value="£">GBP (£)</option><option value="₱">PHP (₱)</option></select></div>
      </div>
    </div>
    <div class="form-section">
      <div class="section-title">Items</div>
      <table class="items-table">
        <thead><tr><th style="width:50%">Description</th><th>Qty</th><th>Price</th><th>Total</th><th></th></tr></thead>
        <tbody id="items-body"></tbody>
      </table>
      <button class="btn-ghost" style="margin-top:12px;font-size:12px" onclick="addItem()">+ Add Item</button>
      <div class="total-row">
        <span class="total-label">Subtotal:</span><span id="subtotal">$0.00</span>
        <span class="total-label">Total:</span><span class="total-val" id="total">$0.00</span>
      </div>
    </div>
    <div class="form-section"><label>Notes</label><textarea id="notes" rows="2" placeholder="Payment terms, thank you message..."></textarea></div>
    <button class="btn" onclick="generatePDF()" style="width:100%">⬇ Download Invoice PDF</button>
  </div>
</div>
<script>
  const dot = document.getElementById('cursor-dot'), ring = document.getElementById('cursor-ring');
  document.addEventListener('mousemove', e => { dot.style.left=e.clientX+'px'; dot.style.top=e.clientY+'px'; setTimeout(()=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';},80); });
  
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('inv-date').value=today;
  const due=new Date();due.setDate(due.getDate()+30);
  document.getElementById('inv-due').value=due.toISOString().split('T')[0];
  document.getElementById('inv-num').value='INV-'+String(Math.floor(Math.random()*900)+100);
  let items=[{desc:'',qty:1,price:0}];
  function renderItems(){
    const sym=document.getElementById('currency').value;
    document.getElementById('items-body').innerHTML=items.map((item,i)=>`<tr>
      <td><input type="text" value="${item.desc}" oninput="items[${i}].desc=this.value" placeholder="Service or product"></td>
      <td><input type="number" value="${item.qty}" oninput="items[${i}].qty=+this.value;calcTotals()" style="width:60px" min="1"></td>
      <td><input type="number" value="${item.price}" oninput="items[${i}].price=+this.value;calcTotals()" style="width:90px" step="0.01"></td>
      <td style="color:var(--text)">${sym}${(item.qty*item.price).toFixed(2)}</td>
      <td><button class="btn-ghost" onclick="removeItem(${i})" style="padding:4px 8px;font-size:11px">×</button></td>
    </tr>`).join('');
    calcTotals();
  }
  function addItem(){items.push({desc:'',qty:1,price:0});renderItems();}
  function removeItem(i){if(items.length===1)return;items.splice(i,1);renderItems();}
  function calcTotals(){
    const sym=document.getElementById('currency').value;
    const sub=items.reduce((s,i)=>s+i.qty*i.price,0);
    document.getElementById('subtotal').textContent=sym+sub.toFixed(2);
    document.getElementById('total').textContent=sym+sub.toFixed(2);
  }
  document.getElementById('currency').onchange=renderItems;
  function generatePDF(){
    const sym=document.getElementById('currency').value;
    const sub=items.reduce((s,i)=>s+i.qty*i.price,0);
    const html=`<!DOCTYPE html><html><head><style>body{font-family:Arial,sans-serif;padding:40px;color:#111;max-width:800px;margin:0 auto;}h1{font-size:32px;margin-bottom:4px;}table{width:100%;border-collapse:collapse;margin:20px 0;}th{background:#f5f5f5;padding:10px;text-align:left;font-size:12px;}td{padding:10px;border-bottom:1px solid #eee;}.total{text-align:right;font-size:18px;font-weight:bold;margin-top:20px;}.muted{color:#888;font-size:13px;}</style></head><body>
    <h1>INVOICE</h1><div class="muted">${document.getElementById('inv-num').value}</div>
    <div style="display:flex;justify-content:space-between;margin:30px 0">
      <div><strong>${document.getElementById('from-name').value||'Your Name'}</strong><br>${document.getElementById('from-email').value}<br>${document.getElementById('from-address').value}</div>
      <div style="text-align:right"><div class="muted">Bill To</div><strong>${document.getElementById('to-name').value||'Client'}</strong><br>${document.getElementById('to-email').value}</div>
    </div>
    <div style="display:flex;gap:40px;margin-bottom:30px"><div><div class="muted">Date</div>${document.getElementById('inv-date').value}</div><div><div class="muted">Due Date</div>${document.getElementById('inv-due').value}</div></div>
    <table><thead><tr><th>Description</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead><tbody>${items.map(i=>`<tr><td>${i.desc||'-'}</td><td>${i.qty}</td><td>${sym}${i.price.toFixed(2)}</td><td>${sym}${(i.qty*i.price).toFixed(2)}</td></tr>`).join('')}</tbody></table>
    <div class="total">Total: ${sym}${sub.toFixed(2)}</div>
    ${document.getElementById('notes').value?`<div style="margin-top:30px;padding:16px;background:#f9f9f9;border-radius:8px;font-size:13px">${document.getElementById('notes').value}</div>`:''}
    </body></html>`;
    const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
  }
  renderItems();
  
</script>
</body>
</html>
