<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF to Text — JustTools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
    :root { --bg: #0a0a0a; --surface: #111; --surface2: #161616; --border: #1e1e1e; --border-bright: #2e2e2e; --text: #f0f0f0; --muted: #666; --accent: #e8ff47; --accent-dim: rgba(232,255,71,0.08); --blue: #79c0ff; --green: #3fb950; --red: #ff7b72; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
    #cursor-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
    #cursor-ring { width: 28px; height: 28px; border: 1px solid rgba(232,255,71,0.4); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: left 0.12s ease, top 0.12s ease; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #666; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.85); backdrop-filter: blur(12px); }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-back { font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: var(--text); }
    .container { max-width: 860px; margin: 0 auto; padding: 60px 40px; }
    .tool-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 12px; }
    .tool-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 52px; line-height: 1.05; margin-bottom: 16px; }
    .tool-desc { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 40px; max-width: 520px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .btn { background: var(--accent); color: #000; border: none; padding: 12px 28px; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; transition: all 0.2s; }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; transform: none; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; transition: all 0.2s; }
    .btn-ghost:hover { border-color: var(--border-bright); color: var(--text); }
    textarea, input[type=text], input[type=number], select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
    textarea:focus, input:focus, select:focus { border-color: var(--border-bright); }
    textarea { resize: vertical; }
    label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 8px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .col { flex: 1; min-width: 200px; }
    @media(max-width:640px) { nav { padding: 16px 20px; } .container { padding: 40px 16px; } .tool-title { font-size: 36px; } }
    .drop-zone{border:2px dashed var(--border);border-radius:12px;padding:60px;text-align:center;transition:border-color 0.2s;margin-bottom:20px;} .drop-zone.drag{border-color:var(--accent);background:var(--accent-dim);} .drop-icon{font-size:40px;margin-bottom:12px;} .drop-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;margin-bottom:8px;} .drop-sub{font-size:12px;color:var(--muted);} .output-box{background:var(--surface2);border:1px solid rgba(232,255,71,0.2);border-radius:8px;padding:20px;font-size:13px;line-height:1.9;white-space:pre-wrap;word-break:break-word;max-height:500px;overflow-y:auto;} .progress{height:3px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden;} .progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width 0.3s;}
  </style>
</head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">📄 Documents</div>
  <h1 class="tool-title">PDF<br>to Text</h1>
  <p class="tool-desc">Extract all text from any PDF file instantly. Runs entirely in your browser — your files never leave your device.</p>
  
  <div class="drop-zone" id="drop-zone" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">
    <div class="drop-icon">📄</div>
    <div class="drop-title">Drop a PDF here</div>
    <div class="drop-sub">or <label for="pdf-input" style="color:var(--accent);text-decoration:underline;cursor:none">browse files</label></div>
    <input type="file" id="pdf-input" accept=".pdf" style="display:none" onchange="handleFile(this.files[0])">
  </div>
  <div class="progress" id="progress" style="display:none"><div class="progress-fill" id="progress-fill"></div></div>
  <div id="result-area" style="display:none">
    <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <button class="btn-ghost" onclick="copyText()">Copy Text</button>
      <button class="btn-ghost" onclick="downloadText()">⬇ Download .txt</button>
      <span id="page-count" style="font-size:12px;color:var(--muted);padding:10px 0"></span>
    </div>
    <div class="output-box" id="output"></div>
  </div>
</div>
<script>
  const dot = document.getElementById('cursor-dot'), ring = document.getElementById('cursor-ring');
  document.addEventListener('mousemove', e => { dot.style.left=e.clientX+'px'; dot.style.top=e.clientY+'px'; setTimeout(()=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';},80); });
  
  // Load pdf.js from CDN
  const script=document.createElement('script');
  script.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  document.head.appendChild(script);
  script.onload=()=>{pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';};

  function handleDrop(e){e.preventDefault();document.getElementById('drop-zone').classList.remove('drag');const f=e.dataTransfer.files[0];if(f&&f.type==='application/pdf')handleFile(f);}
  async function handleFile(file){
    if(!file)return;
    document.getElementById('progress').style.display='block';
    document.getElementById('result-area').style.display='none';
    const arr=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:arr}).promise;
    let text='',pages=pdf.numPages;
    for(let i=1;i<=pages;i++){
      document.getElementById('progress-fill').style.width=(i/pages*100)+'%';
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      text+=`--- Page ${i} ---\n`;
      text+=content.items.map(s=>s.str).join(' ')+'\n\n';
    }
    document.getElementById('output').textContent=text;
    document.getElementById('page-count').textContent=`${pages} pages · ${text.length.toLocaleString()} characters`;
    document.getElementById('result-area').style.display='block';
    document.getElementById('progress').style.display='none';
  }
  function copyText(){navigator.clipboard.writeText(document.getElementById('output').textContent);const b=event.target;b.textContent='Copied!';setTimeout(()=>b.textContent='Copy Text',1500);}
  function downloadText(){const a=document.createElement('a');a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(document.getElementById('output').textContent);a.download='extracted.txt';a.click();}
  
</script>
</body>
</html>
