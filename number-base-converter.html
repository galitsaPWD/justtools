<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Free online word counter — no signup, no account needed. Count words, characters, reading time instantly in your browser.">
<title>Number Base Converter — JustTools</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0a;--surface:#111;--border:#1e1e1e;--border-bright:#2e2e2e;--text:#f0f0f0;--muted:#666;--accent:#e8ff47;--accent-dim:rgba(232,255,71,0.1);--green:#47ff8a;--red:#ff6b6b;--blue:#79c0ff;--purple:#d2a8ff;--orange:#ffa657}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
  nav{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;border-bottom:1px solid var(--border);background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
  .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;text-decoration:none;color:var(--text)}
  .nav-logo span{color:var(--accent)}
  .nav-back{color:var(--muted);font-size:13px;text-decoration:none;transition:color 0.2s}
  .nav-back:hover{color:var(--text)}
  .container{max-width:760px;margin:0 auto;padding:64px 24px}
  .tool-label{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
  .tool-title{font-family:'Syne',sans-serif;font-weight:800;font-size:48px;letter-spacing:-2px;line-height:1;margin-bottom:12px}
  .tool-desc{color:var(--muted);font-size:14px;margin-bottom:40px}

  .input-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:24px}
  .input-row{display:flex;gap:12px;align-items:flex-end}
  .input-group{flex:1}
  .input-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
  .main-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 18px;color:var(--text);font-family:'DM Mono',monospace;font-size:20px;outline:none;transition:border-color 0.2s;letter-spacing:0.05em}
  .main-input:focus{border-color:var(--accent)}
  .main-input.error{border-color:var(--red)}
  select.base-select{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;color:var(--text);font-family:'DM Mono',monospace;font-size:15px;outline:none;cursor:pointer;min-width:160px}

  .error-msg{color:var(--red);font-size:12px;margin-top:8px;min-height:16px}

  .results-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:32px}
  .result-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 24px;cursor:pointer;transition:border-color 0.2s,background 0.2s;position:relative}
  .result-card:hover{border-color:var(--border-bright);background:#141414}
  .result-card.active-base{border-color:var(--accent)}
  .result-base{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:6px;font-weight:600}
  .result-val{font-family:'DM Mono',monospace;font-size:18px;word-break:break-all;line-height:1.5}
  .result-prefix{font-size:11px;margin-top:6px;color:var(--muted)}
  .copy-hint{position:absolute;top:12px;right:12px;font-size:10px;color:var(--muted);opacity:0;transition:opacity 0.2s}
  .result-card:hover .copy-hint{opacity:1}

  .bit-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px}
  .bit-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:16px;color:var(--muted)}
  .bit-display{display:flex;flex-wrap:wrap;gap:4px}
  .bit{width:28px;height:28px;border-radius:4px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all 0.15s}
  .bit.one{background:var(--accent);color:#000;border-color:var(--accent)}
  .bit.zero{background:var(--bg);color:var(--muted)}
  .bit-sep{width:8px}

  .custom-base{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px}
  .custom-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:16px;color:var(--muted)}
  .custom-row{display:flex;gap:12px;align-items:center}
  .custom-label{font-size:13px;color:var(--muted);white-space:nowrap}
  input.base-num{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--accent);font-family:'DM Mono',monospace;font-size:16px;width:80px;outline:none;text-align:center}
  .custom-result{font-size:18px;color:var(--blue);margin-left:8px}

  @media(max-width:600px){.results-grid{grid-template-columns:1fr}.input-row{flex-direction:column}nav{padding:16px 20px}.container{padding:40px 16px}}
  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 100px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  * { scrollbar-width: thin; scrollbar-color: var(--border-bright) var(--bg); }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">🔢 Developer</div>
  <h1 class="tool-title">Number Base<br>Converter</h1>
  <p class="tool-desc">Convert numbers between binary, octal, decimal, hexadecimal, and any custom base from 2–36.</p>

  <div class="input-section">
    <div class="input-row">
      <div class="input-group">
        <div class="input-label">Input Number</div>
        <input class="main-input" id="main-input" placeholder="Enter a number..." oninput="convertAll()" autofocus>
      </div>
      <div>
        <div class="input-label">Input Base</div>
        <select class="base-select" id="from-base" onchange="convertAll()">
          <option value="2">Base 2 — Binary</option>
          <option value="8">Base 8 — Octal</option>
          <option value="10" selected>Base 10 — Decimal</option>
          <option value="16">Base 16 — Hex</option>
        </select>
      </div>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="results-grid" id="results-grid"></div>

  <div class="bit-section">
    <div class="bit-title">Binary Visualization (32-bit)</div>
    <div class="bit-display" id="bit-display"></div>
  </div>

  <div class="custom-base">
    <div class="custom-title">Custom Base Converter</div>
    <div class="custom-row">
      <div class="custom-label">Convert to Base</div>
      <input class="base-num" type="number" id="custom-base" min="2" max="36" value="36" oninput="convertCustom()">
      <span style="color:var(--muted);font-size:13px">=</span>
      <span class="custom-result" id="custom-result">—</span>
    </div>
  </div>
</div>
<script>
  const BASES = [
    {base:2, name:'Binary', color:'var(--green)', prefix:'0b'},
    {base:8, name:'Octal', color:'var(--blue)', prefix:'0o'},
    {base:10, name:'Decimal', color:'var(--accent)', prefix:''},
    {base:16, name:'Hexadecimal', color:'var(--purple)', prefix:'0x'},
  ];

  let currentDecimal = null;

  function convertAll() {
    const input = document.getElementById('main-input').value.trim();
    const fromBase = parseInt(document.getElementById('from-base').value);
    const errEl = document.getElementById('error-msg');

    if (!input) { clearResults(); return; }

    const decimal = parseInt(input, fromBase);
    if (isNaN(decimal)) {
      errEl.textContent = `Invalid input for base ${fromBase}`;
      document.getElementById('main-input').classList.add('error');
      clearResults(); return;
    }
    errEl.textContent = '';
    document.getElementById('main-input').classList.remove('error');
    currentDecimal = decimal;

    document.getElementById('results-grid').innerHTML = BASES.map(b => {
      const val = decimal.toString(b.base).toUpperCase();
      return `<div class="result-card ${fromBase===b.base?'active-base':''}" onclick="useAsInput(${b.base}, '${val}')">
        <div class="result-base" style="color:${b.color}">Base ${b.base} — ${b.name}</div>
        <div class="result-val">${val}</div>
        <div class="result-prefix">${b.prefix}${val}</div>
        <div class="copy-hint">click to use</div>
      </div>`;
    }).join('');

    renderBits(decimal);
    convertCustom();
  }

  function renderBits(n) {
    const bits = (n >>> 0).toString(2).padStart(32, '0');
    const display = document.getElementById('bit-display');
    display.innerHTML = bits.split('').map((b, i) => {
      const sep = (i > 0 && i % 8 === 0) ? '<div class="bit-sep"></div>' : '';
      return `${sep}<div class="bit ${b==='1'?'one':'zero'}">${b}</div>`;
    }).join('');
  }

  function convertCustom() {
    if (currentDecimal === null) return;
    const base = parseInt(document.getElementById('custom-base').value);
    if (base >= 2 && base <= 36) {
      document.getElementById('custom-result').textContent = currentDecimal.toString(base).toUpperCase();
    }
  }

  function useAsInput(base, val) {
    document.getElementById('from-base').value = base;
    document.getElementById('main-input').value = val;
    convertAll();
  }

  function clearResults() {
    currentDecimal = null;
    document.getElementById('results-grid').innerHTML = '';
    document.getElementById('bit-display').innerHTML = '';
    document.getElementById('custom-result').textContent = '—';
  }
</script>
</body>
</html>
