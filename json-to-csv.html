<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON to CSV — JustTools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <style>
    
    .panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;} #json-input,#csv-output{height:50vh;font-size:12px;} .error-msg{color:var(--red);font-size:12px;margin-top:8px;display:none;}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Just<span>Tools</span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="container">
  <div class="tool-label">📊 Data</div>
  <h1 class="tool-title">JSON<br>to CSV</h1>
  <p class="tool-desc">Convert JSON arrays to CSV format instantly. Paste your JSON and download a clean spreadsheet.</p>
  
  <div style="display:flex;gap:10px;margin-bottom:16px">
    <button class="btn" onclick="convert()">Convert →</button>
    <button class="btn-ghost" onclick="downloadCSV()">⬇ Download CSV</button>
    <button class="btn-ghost" onclick="copyCSV()">Copy CSV</button>
  </div>
  <div class="panels">
    <div><label>JSON Input</label><textarea id="json-input" placeholder='[{"name":"Alice","age":30},{"name":"Bob","age":25}]'></textarea><div class="error-msg" id="error-msg"></div></div>
    <div><label>CSV Output</label><textarea id="csv-output" readonly placeholder="CSV will appear here..."></textarea></div>
  </div>
</div>
<script>
  function convert(){
    const raw=document.getElementById('json-input').value.trim();
    const err=document.getElementById('error-msg');
    err.style.display='none';
    try{
      let data=JSON.parse(raw);
      if(!Array.isArray(data))data=[data];
      if(!data.length){err.textContent='Array is empty';err.style.display='block';return;}
      const keys=[...new Set(data.flatMap(o=>Object.keys(o)))];
      const rows=[keys.join(',')];
      data.forEach(obj=>{rows.push(keys.map(k=>{const v=obj[k]??'';const s=String(v);return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:s;}).join(','));});
      document.getElementById('csv-output').value=rows.join('\n');
    }catch(e){err.textContent='Invalid JSON: '+e.message;err.style.display='block';}
  }
  function downloadCSV(){const v=document.getElementById('csv-output').value;if(!v)return;const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(v);a.download='data.csv';a.click();}
  function copyCSV(){const v=document.getElementById('csv-output').value;if(!v)return;navigator.clipboard.writeText(v);const b=event.target;b.textContent='Copied!';setTimeout(()=>b.textContent='Copy CSV',1500);}
  document.getElementById('json-input').value='[\n  {"name":"Alice","age":30,"city":"New York"},\n  {"name":"Bob","age":25,"city":"London"},\n  {"name":"Carol","age":35,"city":"Tokyo"}\n]';
  convert();
  
</script>
<script src="common.js"></script>
</body>
</html>
